      e quanto isso economiza de juros.
      <div style="margin-top:18px"><button class="btn" id="dv-add1">Cadastrar uma dívida</button></div>
    </div>`;
    host.appendChild(v);
    v.querySelector('#dv-add1').onclick=()=>abrirDivida();
    return;
  }

  const av=simularQuitacao(lista, dvExtra, 'avalanche');
  const bn=simularQuitacao(lista, dvExtra, 'bola');
  const r = dvEstrategia==='avalanche' ? av : bn;
  const total=dividaTotal();

  /* HERÓI: o total devido e QUANDO acaba — o número que a pessoa quer. */
  const her=document.createElement('div'); her.className='heroi';
  her.innerHTML=`
    <div class="heroi-lb">Você deve</div>
    <div class="heroi-n neg">${BRL(total)}</div>
    <div class="heroi-ctx">${
      r.impossivel
        ? `Pagando <b>${BRL(r.capacidade)}</b> por mês, essa dívida <b>não acaba</b> — os juros crescem mais rápido que o pagamento.`
        : `Pagando <b>${BRL(r.capacidade)}</b> por mês, você fica livre em <b>${r.meses} ${r.meses===1?'mês':'meses'}</b>${mesLivre(r.meses)}.`
    }</div>`;
  host.appendChild(her);

  /* O alerta que ninguém dá: quando a parcela não cobre nem os juros. */
  if(r.impossivel){
    const al=document.createElement('div'); al.className='dv-afoga';
    const afogando=lista.filter(dividaAfoga);
    al.innerHTML=`<b>⚠️ Isso é o rotativo</b>
      <p>${afogando.length? `Em <b>${afogando.map(d=>esc(d.nome)).join('</b>, <b>')}</b>, a parcela não cobre nem os juros do mês.
          O saldo cresce mesmo você pagando em dia.` : `O pagamento atual não vence os juros.`}</p>
      <p>Não é falta de disciplina: é matemática. As saídas reais são <b>aumentar o pagamento</b>,
      <b>negociar o juro</b> com o credor, ou <b>trocar por uma dívida mais barata</b>
      (portabilidade, consignado). Use o controle abaixo para ver quanto por mês faz a conta virar.</p>`;
    host.appendChild(al);
  }

  /* ESTRATÉGIA — as duas, com o trade-off medido */
  const est=document.createElement('div'); est.className='card';
  const dif = bn.juros - av.juros;
  const priAv = av.quitadas[0], priBn = bn.quitadas[0];
  est.innerHTML=`<h3>Por qual começar</h3>
    <div class="dv-tabs">
      <button class="dv-tab${dvEstrategia==='avalanche'?' on':''}" data-e="avalanche">
        <b>Avalanche</b><i>paga menos juros</i></button>
      <button class="dv-tab${dvEstrategia==='bola'?' on':''}" data-e="bola">
        <b>Bola de neve</b><i>vitória mais cedo</i></button>
    </div>
    <div class="dv-cmp">
      ${dif>1 ? `A <b>avalanche</b> economiza <b>${BRL(dif)}</b> em juros.
                 A <b>bola de neve</b> quita a primeira dívida no <b>mês ${priBn.mes}</b>
                 (${esc(priBn.nome)}) contra o mês ${priAv.mes} da avalanche.<br><br>
                 <span style="color:var(--s400)">A avalanche é a ótima no papel. Mas quem desiste no mês 3
                 não colhe a economia do mês ${av.meses}. Escolha a que você vai conseguir seguir.</span>`
              : `Nas suas dívidas as duas dão quase no mesmo — siga a que te motivar mais.`}
    </div>`;
  host.appendChild(est);
  est.querySelectorAll('.dv-tab').forEach(b=> b.onclick=()=>{ dvEstrategia=b.dataset.e; render(); });

  /* QUANTO A MAIS POR MÊS — o controle que mostra o poder do esforço extra */
  const ex=document.createElement('div'); ex.className='card';
  const semExtra=simularQuitacao(lista,0,dvEstrategia);
  ex.innerHTML=`<h3>E se eu pagar um pouco a mais?</h3>
    <div class="dv-lb"><span>A mais por mês</span><b id="dv-ex-lb">${BRL(dvExtra)}</b></div>
    <input type="range" id="dv-extra" class="dv-range" min="0" max="1000" step="25" value="${Math.min(1000,dvExtra)}">
    <div class="dv-ganho" id="dv-ganho"></div>`;
  host.appendChild(ex);

  const pintarGanho=()=>{
    const g=document.getElementById('dv-ganho');
    const cur=simularQuitacao(lista, dvExtra, dvEstrategia);
    if(cur.impossivel){ g.innerHTML=`<span style="color:var(--neg)">Ainda não vence os juros. Arraste mais.</span>`; return; }
    const mesesGanhos = semExtra.impossivel ? null : semExtra.meses - cur.meses;
    const jurosGanhos = semExtra.impossivel ? null : semExtra.juros - cur.juros;
    g.innerHTML = dvExtra<=0
      ? `Sem nada a mais: <b>${cur.meses} meses</b> e <b>${BRL(cur.juros)}</b> de juros.`
      : `Livre em <b>${cur.meses} meses</b>${mesesGanhos>0?` — <b>${mesesGanhos} ${mesesGanhos===1?'mês':'meses'} antes</b>`:''}.
         ${jurosGanhos>1?`Economiza <b>${BRL(jurosGanhos)}</b> de juros.`:''}`;
  };
  pintarGanho();
  const sl=document.getElementById('dv-extra');
  sl.oninput=e=>{ dvExtra=+e.target.value;
    document.getElementById('dv-ex-lb').textContent=BRL(dvExtra); pintarGanho(); };

  /* A LISTA — na ordem da estratégia escolhida */
  const ord=[...lista].sort((a,b)=> dvEstrategia==='avalanche'
    ? (+b.juros)-(+a.juros) : (+a.saldo)-(+b.saldo));
  const lc=document.createElement('div'); lc.className='card';
  lc.innerHTML=`<h3>Suas dívidas <span class="sub">${BRL(dividaParcela())}/mês em parcelas</span></h3>` +
    ord.map((d,i)=>{
      const q=r.quitadas.find(x=>x.id===d.id);
      const afoga=dividaAfoga(d);
      return `<button type="button" class="dv-i" data-id="${d.id}"
          aria-label="Editar ${esc(d.nome)}, saldo ${BRL(+d.saldo)}">
        <span class="dv-ord${i===0?' alvo':''}" aria-hidden="true">${i===0?'★':i+1}</span>
        <span class="dv-tx">
          <b>${esc(d.nome)}</b>
          <span>${(+d.juros).toLocaleString('pt-BR')}% ao mês · parcela ${BRL(+d.parcela)}
            ${afoga?'<i class="dv-flag">não cobre os juros</i>':''}</span>
        </span>
        <span class="dv-vl">
          <b>${BRL(+d.saldo)}</b>
          <span>${q?`quita no mês ${q.mes}`:'—'}</span>
        </span>
      </button>`;
    }).join('') +
    `<div class="budmeta" style="margin-top:14px">★ é por onde começar jogando todo o dinheiro extra.
     Nas outras, pague só a parcela mínima.</div>
     <button class="btn btn-ghost" id="dv-add" style="width:100%;margin-top:14px">Adicionar dívida</button>`;
  host.appendChild(lc);

  lc.querySelector('#dv-add').onclick=()=>abrirDivida();
  lc.querySelectorAll('.dv-i').forEach(el=> el.onclick=()=>{
    const d=S.dividas.find(x=>x.id===el.dataset.id); if(d) abrirDivida(d);
  });
}

/* Sinal no menu: leva o olho para o que precisa de atenção.
   Ao dividir o app em abas, a pessoa ganha organização mas PERDE a visão
   periférica — o que está fora da tela deixa de existir. O badge devolve isso
   sem trazer o empilhamento de volta. Migrou das abas de módulo (mortas) para

function vmBadge(id,m){
  if(id==='orcamento'){

  if(id==='cartoes'){
    return faturasTotal(m)>0 ? `<span class="nav-dot" title="fatura a pagar"></span>` : '';

  return '';

  const items=month(m).expenses.map((x,i)=>({...x,i}));
  const rows=items.map(x=>`<tr><td>${fmtDate(x.date)}</td><td>${esc(x.desc)}<div class="budmeta">${esc(x.cat)}</div></td>
     <td><span class="tag ${isCredit(x.pay)?'credit':''}">${esc(x.pay)}</span></td>
     <td class="num neg">${BRL(+x.value)}</td><td><button class="rowdel" data-i="${x.i}">✕</button></td></tr>`).join('');
  c.innerHTML=`<h3>🧾 Gastos <span class="sub num">${BRL(month(m).expenses.reduce((s,x)=>s+ +x.value,0))}</span></h3>
    <table><thead><tr><th>Data</th><th>Descrição</th><th>Pgto</th><th>Valor</th><th></th></tr></thead>
    <tbody>${rows||`<tr><td colspan="5" class="empty">Registre contas, mercado, assinaturas, do dia a dia…</td></tr>`}</tbody></table>
    <div class="addrow">
      ${vmCampoData('e-date')}
      <input class="f-desc" id="e-desc" placeholder="Descrição">
      <select class="f-sel" id="e-cat">${S.categories.map(x=>`<option>${x}</option>`).join('')}</select>
      <select class="f-sel" id="e-pay">${allPayments().map(x=>`<option>${x}</option>`).join('')}</select>
      <input class="f-num num money" id="e-val" type="text" inputmode="decimal" placeholder="0,00">
      <button class="btn btn-sm" id="e-add">Adicionar</button>
    </div>
    <div class="budmeta" style="margin-top:6px">Pagamento em cartão = crédito (entra na fatura do mês seguinte). Pix/Débito sai na hora.</div>`;
  c.querySelectorAll('.rowdel').forEach(b=>b.onclick=()=>{month(m).expenses.splice(+b.dataset.i,1);render()});
  c.querySelector('#e-add').onclick=()=>{
    const d=vmDateISO(c.querySelector('#e-date')),de=c.querySelector('#e-desc').value.trim(),cat=c.querySelector('#e-cat').value,
      pay=c.querySelector('#e-pay').value,v=vmMoneyVal(c.querySelector('#e-val'));
    if(!de||!(v>0))return toast('Preencha descrição e valor');
    month(m).expenses.push({date:d||today(m),desc:de,cat,pay,value:v}); toast('Gasto registrado'); render();
  };
  return c;
}

function parceladasCard(m){
  const c=document.createElement('div'); c.className='card';
  const active=installmentItems(m);
  const rows=S.purchases.map(p=>{
    const n=m-p.start+1, on = n>=1&&n<=p.parcelas;
    return `<tr style="${on?'':'opacity:.45'}"><td>${esc(p.desc)}<div class="budmeta">${esc(p.cat)} · ${esc(p.card)}</div></td>
      <td class="num">${BRL(+p.value)}</td>
      <td>${on?`<span class="tag">${n}/${p.parcelas}</span>`:`<span class="budmeta">${n<1?'inicia '+MABBR[p.start]:'quitada'}</span>`}</td>
      <td><button class="rowdel" data-id="${p.id}">✕</button></td></tr>`;
  }).join('');
  c.innerHTML=`<h3>💳 Compras parceladas <span class="sub num">${BRL(active.reduce((s,x)=>s+x.value,0))} neste mês</span></h3>
    <table><thead><tr><th>Compra</th><th>Parcela</th><th>Mês</th><th></th></tr></thead>
    <tbody>${rows||`<tr><td colspan="4" class="empty">Cadastre uma compra parcelada — ela se espalha sozinha pelos meses.</td></tr>`}</tbody></table>
    <div class="addrow">
      <input class="f-desc" id="p-desc" placeholder="Descrição (ex.: Celular pai)">
      <select class="f-sel" id="p-cat">${S.categories.map(x=>`<option>${x}</option>`).join('')}</select>
      <select class="f-sel" id="p-card">${S.cards.map(x=>`<option>${esc(x.nome)}</option>`).join('')}</select>
      ${vmCampoData('p-data','f-sm','title="Data da compra"')}
      <input class="f-num num money" id="p-val" type="text" inputmode="decimal" placeholder="valor/parcela">
      <input class="f-sm num" id="p-n" type="number" inputmode="numeric" min="1" max="48" placeholder="nº parc.">
      <button class="btn btn-sm" id="p-add">Adicionar</button>
    </div>
    <div class="budmeta" id="p-hint" style="margin-top:6px">A 1ª parcela é definida sozinha pela <b>melhor data de compra</b> do cartão.</div>`;
  c.querySelectorAll('.rowdel').forEach(b=>b.onclick=()=>{S.purchases=S.purchases.filter(x=>x.id!==b.dataset.id);render()});

  /* Mostra ao vivo em que mês a 1ª parcela vai cair — o usuário entende a regra. */
  const prever=()=>{
    const d=vmDateISO(c.querySelector('#p-data')), card=c.querySelector('#p-card').value;
    const h=c.querySelector('#p-hint');
    if(!d){ h.innerHTML='A 1ª parcela é definida sozinha pela <b>melhor data de compra</b> do cartão.'; return; }
    const cd=getCard(card), mf=mesDaFatura(d,card);
    const dia=new Date(d+'T12:00:00').getDate(), depois = (cd?.melhor||1)>1 && dia>=(cd?.melhor||1);
    h.innerHTML = `1ª parcela em <b>${MONTHS[Math.min(11,mf)]||'Janeiro'}</b>. ` +
      (depois ? `Comprou a partir do dia ${cd.melhor} (melhor data) — caiu no ciclo seguinte, com mais prazo. ✔`
              : `Comprou antes do dia ${cd?.melhor||1} — entra na fatura que fecha agora.`);
  };
  /* 'input' também: com máscara o mês previsto aparece assim que a data fecha. */
  c.querySelector('#p-data').addEventListener('input',prever);
  c.querySelector('#p-data').addEventListener('change',prever);
  c.querySelector('#p-card').onchange=prever;

  c.querySelector('#p-add').onclick=()=>{
    const de=c.querySelector('#p-desc').value.trim(),cat=c.querySelector('#p-cat').value,card=c.querySelector('#p-card').value,
      data=vmDateISO(c.querySelector('#p-data')), v=vmMoneyVal(c.querySelector('#p-val')),n=parseInt(c.querySelector('#p-n').value);
    if(!de||!(v>0)||!(n>0))return toast('Preencha descrição, valor da parcela e nº de parcelas');
    const start=Math.min(11, mesDaFatura(data, card));   /* automático pela melhor data */
    S.purchases.push({id:uid(),desc:de,cat,card,value:v,parcelas:n,start,data:data||today(m)});
    toast(`${n}x a partir de ${MABBR[start]} ✨`); render();
  };
  return c;
}

function panoramaCard(){
  const c=document.createElement('div'); c.className='card';
  const p=panorama(), max=Math.max(1,...p.map(x=>x.total));
  const cols=p.map((x,m)=>`<div class="col ${x.total>max*0.66?'hot':''}">
     <div class="colhead">${MABBR[m]}</div>
     <div class="colbar"><i style="height:${x.total/max*80}px" title="${BRL(x.total)}"></i></div>
     <div class="colval num">${x.total?BRL(x.total).replace('R$ ',''):''}<div class="budmeta">${x.count?x.count+'x':''}</div></div></div>`).join('');
  c.innerHTML=`<h3>🗓️ Panorama de parcelamento <span class="sub">quanto de parcela cai em cada mês</span></h3>
     <div class="pano">${cols}</div>
     <div class="budmeta" style="margin-top:8px">Meses em vermelho concentram mais parcelas — pense duas vezes antes de parcelar de novo neles.</div>`;
  return c;
}

function budgetCard(m){
  const c=document.createElement('div'); c.className='card'; c.id='cardOrcamento';
  const estouradas=S.categories.filter(cat=>{const t=+(S.budgets[cat]||0);return t>0 && categoryReal(cat,m)/t>=1;});
  const lines=S.categories.map(cat=>{
    const teto=+ (S.budgets[cat]||0), real=categoryReal(cat,m), r=teto?real/teto:0, mo=moon(r);
    const estourou = teto>0 && r>=1;
    return `<div class="budline${estourou?' estourou':''}">
      <div><div class="budcat">${esc(cat)}${estourou?' <span class="tag-estouro">estourou</span>':''}</div>
        <div class="bar"><i style="width:${Math.min(100,r*100)}%;background:${barColor(r)}"></i></div></div>
      <div class="budmeta num" style="text-align:right">${BRL(real)}<br><span style="opacity:.7">de ${teto?BRL(teto):'—'}</span></div>
      <div class="arc" title="${mo.label}">${clarityArc(r)}</div>
    </div>`;
  }).join('');
  /* Alerta que realmente chama atenção: pulsa e fica no topo do card. */
  const alerta = estouradas.length ? `<div class="vm-alerta">
      <span class="vm-alerta-ic">!</span>
      <div><b>${estouradas.length} categoria${estouradas.length>1?'s':''} no limite</b>
      <div>${esc(estouradas.slice(0,3).join(' · '))}${estouradas.length>3?' e mais…':''}</div></div>
    </div>` : '';
  c.innerHTML=`<h3>Orçamento por categoria <span class="sub">Arco de Clareza = quanto do teto já foi</span></h3>
    ${alerta}${lines}
    <div class="addrow" style="margin-top:12px">
      <input class="f-desc" id="oc-nova" placeholder="Nova categoria (ex.: Pets)">
      <input class="f-num num money" id="oc-teto" type="text" inputmode="decimal" placeholder="teto R$">
      <button class="btn btn-sm" id="oc-add">Criar</button>
    </div>
    <div class="budmeta" style="margin-top:8px">O arco dourado se completa conforme você usa o teto — cheio = no limite.</div>`;
  c.querySelector('#oc-add').onclick=()=>{
    const n=c.querySelector('#oc-nova').value.trim(), t=vmMoneyVal(c.querySelector('#oc-teto'));
    if(!n) return toast('Dê um nome à categoria');
    if(!S.categories.includes(n)) S.categories.push(n);
    S.budgets[n] = t>0 ? t : 0;
    toast(`Categoria "${n}" criada`); render();
  };
  return c;
}

/* MÓDULO 1 — o que SAI da conta agora: a fatura fechada no mês anterior.
   De propósito não mostra nada do mês corrente: isso é o Uso (módulo 2). */
function cardsCard(m){
  const c=document.createElement('div'); c.className='card'; c.id='cardFatura';
  const ref = m>0 ? MONTHS[m-1] : '—';
  const rows=S.cards.map(cd=>{
    const f=faturaCard(cd.nome,m);
    return `<tr><td><b>${esc(cd.nome)}</b><div class="budmeta">vence dia ${cd.venc||10}</div></td>
     <td class="num ${f>0?'neg':''}">${BRL(f)}</td></tr>`;
  }).join('');
  const tot=faturasTotal(m);
  c.innerHTML=`<h3>💳 Fatura a pagar <span class="sub num neg">${BRL(tot)}</span></h3>
     <div class="budmeta" style="margin-bottom:8px">Competência de <b>${ref}</b> — o crédito daquele mês vence agora e sai da sua conta.</div>
     <table><thead><tr><th>Cartão</th><th>Valor a pagar</th></tr></thead><tbody>${rows}</tbody></table>
     ${tot===0?`<div class="budmeta" style="margin-top:8px">Nada a pagar: não há crédito lançado em ${ref}.</div>`:''}`;
  return c;
}

/* MÓDULO 2 — o que você está passando no crédito AGORA.
   Não sai da conta neste mês: é a prévia da fatura que vence no próximo. */
function usoCartaoCard(m){
  const c=document.createElement('div'); c.className='card'; c.id='cardUso';
  const prox = m<11 ? MONTHS[m+1] : 'Janeiro';
  const rows=S.cards.map(cd=>{
    const u=cardSpend(cd.nome,m);
    return `<tr><td><b>${esc(cd.nome)}</b><div class="budmeta">melhor compra: dia ${cd.melhor||1}</div></td>
     <td class="num ${u>0?'warn':''}">${BRL(u)}</td></tr>`;
  }).join('');
  const tot=usoCartaoTotal(m);
  c.innerHTML=`<h3>📈 Uso do cartão <span class="sub num warn">${BRL(tot)}</span></h3>
     <div class="budmeta" style="margin-bottom:8px">Previsão da fatura que vence em <b>${prox}</b>. Tudo que você passar no crédito neste mês cai aqui.</div>
     <table><thead><tr><th>Cartão</th><th>Usado no mês</th></tr></thead><tbody>${rows}</tbody></table>
     ${tot>0?`<div class="budmeta" style="margin-top:8px">Este valor <b>ainda não saiu</b> da sua conta — ele vira a fatura de ${prox}.</div>`:''}`;
  return c;
}

function investCard(m){
  const c=document.createElement('div'); c.className='card'; c.id='cardInvest';
  const rows=month(m).investments.map((x,i)=>{
    const res = x.tipo==='resgate';
    return `<tr><td>${fmtDate(x.date)}</td><td>${esc(x.place)}
       <div class="budmeta">${res?'resgate':'aporte'}</div></td>
     <td class="num ${res?'neg':'pos'}">${res?'−':'+'} ${BRL(+x.value)}</td>
     <td><button class="rowdel" data-i="${i}">✕</button></td></tr>`;
  }).join('');
  const liq=investTotal(m);
  c.innerHTML=`<h3>🌱 Pensando no futuro <span class="sub num">${liq>=0?'guardou ':'resgatou '}${BRL(Math.abs(liq))}</span></h3>
    <div class="budmeta" style="margin-bottom:8px">Primeiro você se paga — depois gasta.</div>
    <table><thead><tr><th>Data</th><th>Onde</th><th>Valor</th><th></th></tr></thead>
    <tbody>${rows||`<tr><td colspan="4" class="empty">Guardou algo? Caixinha, Tesouro, ação… registre aqui.</td></tr>`}</tbody></table>
    <div class="addrow">
      ${vmCampoData('v-date')}
      <input class="f-desc" id="v-place" placeholder="Onde (ex.: Caixinha Nu)">
      <select class="f-sel" id="v-tipo"><option value="aporte">Guardar (aporte)</option><option value="resgate">Resgatar (saída)</option></select>
      <input class="f-num num money" id="v-val" type="text" inputmode="decimal" placeholder="0,00">
      <button class="btn btn-sm" id="v-add">Registrar</button>
    </div>`;
  c.querySelectorAll('.rowdel').forEach(b=>b.onclick=()=>{month(m).investments.splice(+b.dataset.i,1);render()});
  c.querySelector('#v-add').onclick=()=>{
    const d=vmDateISO(c.querySelector('#v-date')),pl=c.querySelector('#v-place').value.trim(),
      tipo=c.querySelector('#v-tipo').value, v=vmMoneyVal(c.querySelector('#v-val'));
    if(!pl||!(v>0))return toast('Preencha onde e valor');
    month(m).investments.push({date:d||today(m),place:pl,value:v,tipo});
    toast(tipo==='resgate'?'Resgate registrado':'Investimento guardado 🌱'); render();
  };
  return c;
}

/* ---------- VIEW ANO ---------- */
function renderYear(){
  const host=document.getElementById('viewYear'); host.innerHTML='';
  let inc=0,out=0,inv=0;
  const perMonth=[...Array(12)].map((_,m)=>{inc+=incomesTotal(m);out+=cashOut(m);inv+=investTotal(m);return saldoFinal(m);});
  const saldoAtual = saldoFinal(11);

  const kpi=document.createElement('div'); kpi.className='kpi';
  kpi.innerHTML=`
    ${kpiBox('Entradas no ano','var(--pos)',BRL(inc),'▲')}
    ${kpiBox('Saídas no ano','var(--neg)',BRL(out),'▼')}
    ${kpiBox('Investido no ano','var(--brand)',BRL(inv),'◆')}
    ${kpiBox('Saldo em Dez',saldoAtual>=0?'var(--pos)':'var(--neg)',BRL(saldoAtual),saldoAtual>=0?'🎉':'⚠️')}`;
  host.appendChild(kpi);

  /* Mês sem lançamento NÃO entra no gráfico: antes ele herdava o saldo e
     desenhava uma barra cheia, dando a falsa impressão de caixa naquele mês. */
  const chart=document.createElement('div'); chart.className='card'; chart.style.marginTop='16px';
  const vivos=[...Array(12)].map((_,m)=>mesTemMovimento(m));
  const max=Math.max(1,...perMonth.filter((_,m)=>vivos[m]).map(Math.abs));
  chart.innerHTML=`<h3>Saldo por mês <span class="sub">só meses com lançamento</span></h3>
    <div class="chart">${perMonth.map((v,m)=>{
      if(!vivos[m]) return `<div class="c vazio"><div style="font-size:9px">&nbsp;</div>
        <i style="height:3px;background:var(--line2)" title="sem lançamentos"></i>
        <div class="lb">${MABBR[m]}</div></div>`;
      return `<div class="c">
        <div style="font-size:9px;color:var(--s400)" class="num">${v?BRL(v).replace('R$ ',''):''}</div>
        <i style="height:${Math.abs(v)/max*100}%;background:${v>=0?'var(--grad-brand)':'var(--neg)'}"></i>
        <div class="lb">${MABBR[m]}</div></div>`;
    }).join('')}</div>
    <div class="budmeta" style="margin-top:8px">Meses apagados ainda não têm lançamento — o saldo não é replicado neles de propósito.</div>`;
  host.appendChild(chart);

  // parcelas do ano + top categorias
  const g=document.createElement('div'); g.className='grid g2'; g.style.marginTop='16px';
  g.appendChild(panoramaCard());
  // top categorias do ano
  const totals={}; S.categories.forEach(cat=>{let t=0;for(let m=0;m<12;m++)t+=categoryReal(cat,m);if(t>0)totals[cat]=t;});
  const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const tmax=Math.max(1,...sorted.map(x=>x[1]));
  const catcard=document.createElement('div'); catcard.className='card';
  catcard.innerHTML=`<h3>Para onde foi o dinheiro <span class="sub">top categorias do ano</span></h3>
    ${sorted.map(([cat,t])=>`<div style="padding:7px 0">
      <div style="display:flex;justify-content:space-between;font-size:13px"><span class="budcat">${esc(cat)}</span><span class="num budmeta">${BRL(t)}</span></div>
      <div class="bar"><i style="width:${t/tmax*100}%;background:var(--grad-brand)"></i></div></div>`).join('')||'<div class="empty">Sem gastos ainda.</div>'}`;
  g.appendChild(catcard);
  host.appendChild(g);

  if(!isPro()){
    const up=document.createElement('div'); up.className='card'; up.style.marginTop='16px'; up.style.textAlign='center';
    up.innerHTML=`<h3 style="justify-content:center">🔓 A visão anual completa é Pro</h3>
      <p class="budmeta">No Free você lança só o mês atual. Desbloqueie os 12 meses, cartões ilimitados e relatórios por <b>R$ 9,90/mês</b>.</p>
      <button class="btn" style="margin-top:10px" onclick="paywall()">Quero o ano inteiro</button>`;
    host.appendChild(up);
  }
}

/* ---------- VIEW INVESTIMENTOS ---------- */
function renderInvest(){
  const host=document.getElementById('viewInvest'); host.innerHTML='';
  let apo=0, res=0;
  for(let m=0;m<12;m++){ apo+=investAportes(m); res+=investResgates(m); }
  const bal=apo-res;

  /* Metas primeiro: o PORQUÊ vem antes do quanto. Número de patrimônio sem
     motivo não segura ninguém no terceiro mês. */
  host.appendChild(metasCard());

  const kpi=document.createElement('div'); kpi.className='kpi';
  kpi.innerHTML=`
    ${kpiBox('Aportes no ano','var(--pos)',BRL(apo),'▲')}
    ${kpiBox('Resgates no ano','var(--neg)',BRL(res),'▼')}
    ${kpiBox('Balanço (investido)',bal>=0?'var(--gold)':'var(--neg)',BRL(bal),'◆')}
    ${kpiBox('Guardado por mês','var(--brand-2)',BRL(apo/12),'~')}`;
  host.appendChild(kpi);

  /* Evolução do patrimônio acumulado — mês a mês, só onde houve movimento */
  const vivos=[...Array(12)].map((_,m)=>month(m).investments.length>0);
  const acum=[...Array(12)].map((_,m)=>patrimonio(m));
  const max=Math.max(1,...acum.map(Math.abs));
  const ev=document.createElement('div'); ev.className='card'; ev.style.marginTop='16px';
  ev.innerHTML=`<h3>Patrimônio investido <span class="sub">acumulado, mês a mês</span></h3>
    <div class="chart">${acum.map((v,m)=>`<div class="c${vivos[m]||v!==0?'':' vazio'}">
      <div style="font-size:9px;color:var(--s400)" class="num">${v?BRL(v).replace('R$ ',''):''}</div>
      <i style="height:${Math.abs(v)/max*100}%;background:${v>=0?'var(--grad-gold)':'var(--neg)'}"></i>
      <div class="lb">${MABBR[m]}</div></div>`).join('')}</div>`;
  host.appendChild(ev);

  /* Extrato completo: toda entrada e saída, com o balanço */
  const linhas=[];
  for(let m=0;m<12;m++) month(m).investments.forEach((x,i)=>linhas.push({...x,m,i}));
  linhas.sort((a,b)=> (a.date||'').localeCompare(b.date||'') );
  const ext=document.createElement('div'); ext.className='card'; ext.style.marginTop='16px';
  ext.innerHTML=`<h3>Extrato de investimentos <span class="sub num">${linhas.length} lançamento(s)</span></h3>
    <table><thead><tr><th>Data</th><th>Mês</th><th>Onde</th><th>Tipo</th><th>Valor</th><th></th></tr></thead>
    <tbody>${linhas.length? linhas.map(x=>{
      const r=x.tipo==='resgate';
      return `<tr><td>${fmtDate(x.date)}</td><td>${MABBR[x.m]}</td><td>${esc(x.place)}</td>
        <td><span class="tag ${r?'':'credit'}">${r?'resgate':'aporte'}</span></td>
        <td class="num ${r?'neg':'pos'}">${r?'−':'+'} ${BRL(+x.value)}</td>
        <td><button class="rowdel" data-m="${x.m}" data-i="${x.i}">✕</button></td></tr>`;
    }).join('') : `<tr><td colspan="6" class="empty">Nenhum investimento ainda. Comece pelo mês atual — primeiro você se paga.</td></tr>`}</tbody>
    ${linhas.length?`<tfoot><tr>
      <td colspan="4"><b>Balanço</b></td>
      <td class="num" style="color:var(--gold);font-weight:700">${BRL(bal)}</td><td></td></tr></tfoot>`:''}
    </table>`;
  ext.querySelectorAll('.rowdel').forEach(b=>b.onclick=()=>{
    month(+b.dataset.m).investments.splice(+b.dataset.i,1); render();
  });
  host.appendChild(ext);
}

/* ---------- VIEW BASE ---------- */

/* ============================================================
   TOAST — agora anunciado e com DESFAZER
   Achado da auditoria: o toast confirmava tudo ("Lançado", "Apagado") mas
   não tinha aria-live — quem usa leitor de tela agia às cegas.
   ============================================================ */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1900);
}
function celebrate(msg){toast(msg);}

/* "Zerar tudo" tinha DOIS problemas, não um.
   1. UX: um confirm() nativo para apagar a vida financeira inteira. Clicar
      "OK" é reflexo — não é decisão. Aqui exige DIGITAR, e oferece o backup
      antes, porque a pergunta certa não é "tem certeza?" e sim "você já tem
      cópia?".
   2. BUG: fazia `S = structuredClone(DEFAULTS)`, REATRIBUINDO S. O motor de
      sync no auth.js segura a referência de S e muta no lugar — depois de
      zerar, ele continuaria empurrando o objeto ANTIGO para a nuvem. Ou seja:
      zerava na tela e não zerava no servidor. Agora muta no lugar. */
function zerarTudo(){
  const r=document.getElementById('overlayRoot');
  r.innerHTML=`<div class="overlay"><div class="sheet">
    <h2>Zerar tudo</h2>
    <p class="budmeta" style="margin:8px 0 12px">Apaga <b>todos</b> os lançamentos, cartões, dívidas e metas
    deste ano. <b>Não tem como desfazer.</b></p>
    <p class="budmeta" style="margin-bottom:10px">Antes, que tal
      <button class="linklike" id="zt-exp" style="padding:0;display:inline">baixar seu backup</button>?</p>
    <div class="vm-field"><label for="zt-txt">Digite <b>ZERAR</b> para confirmar</label>
      <input id="zt-txt" placeholder="ZERAR" autocomplete="off"></div>
    <button class="btn-perigo" id="zt-ok" style="width:100%;opacity:.5" disabled>Zerar tudo</button>
    <button class="linklike" id="zt-nao">Cancelar</button>
  </div></div>`;
  const txt=document.getElementById('zt-txt'), ok=document.getElementById('zt-ok');
  setTimeout(()=>txt.focus(),50);
  txt.oninput=()=>{ const v=txt.value.trim().toUpperCase()==='ZERAR';
    ok.disabled=!v; ok.style.opacity=v?'1':'.5'; };
  document.getElementById('zt-exp').onclick=exportData;
  document.getElementById('zt-nao').onclick=()=> r.innerHTML='';
  ok.onclick=()=>{
    const novo=structuredClone(DEFAULTS); novo.current=new Date().getMonth();
    Object.keys(S).forEach(k=>delete S[k]); Object.assign(S,novo);  /* muta, não reatribui */
    activeMonth=S.current; view='month'; r.innerHTML=''; render();
    toast('Tudo zerado');
  };
}

/* DESFAZER no lugar de confirm().
   Por que a troca: confirmação vira reflexo. Em duas semanas a pessoa clica
   "sim" sem ler, e ela deixa de proteger — só cobra pedágio em toda ação
   legítima. Desfazer inverte: a ação acontece na hora (rápido para quem quer)
   e continua reversível por alguns segundos (seguro para quem errou).
   `refazer` recebe uma função que devolve o estado ao ponto anterior. */
function toastDesfazer(msg, refazer, ms=6000){
  const t=document.getElementById('toast');
  clearTimeout(t._t);
  t.innerHTML='';
  const tx=document.createElement('span'); tx.textContent=msg;
  const bt=document.createElement('button'); bt.type='button'; bt.textContent='Desfazer';
  const box=document.createElement('span'); box.className='toast-undo';
  box.append(tx,bt); t.appendChild(box);
  t.classList.add('show');

  const fim=()=>{ t.classList.remove('show'); clearTimeout(t._t); };
  bt.onclick=()=>{ try{ refazer(); }catch(e){} fim(); render(); toast('Desfeito'); };
  t._t=setTimeout(fim, ms);
}

/* ============================================================
   PADRÃO VIZIO · COMPORTAMENTO DE FOLHA (achados da auditoria)
   Vale para TODA folha do app — presente e futura. Em vez de lembrar de
   fazer isso em cada `overlayRoot.innerHTML=`, um observador cuida de todas.
   ============================================================ */
(function folhaPadrao(){
  const raiz = document.getElementById('overlayRoot');
  if(!raiz) return;

  const aberta = () => !!raiz.querySelector('.overlay');
  const fechar = () => {
    /* respeita o botão de fechar de cada folha (algumas têm limpeza própria) */
    const x = raiz.querySelector('#vm-close, #novo-fecha, #mes-fecha, #nv-nao, #dv-nao, #mt-nao, #cropNao, #ap-nao, #zt-nao');
    if(x) x.click(); else raiz.innerHTML='';
  };

  /* 1. Esc fecha. Todo modal do mundo fecha com Esc; o usuário tenta. */
  addEventListener('keydown', e=>{
    if(e.key==='Escape' && aberta()) fechar();
    /* 2. Foco preso dentro da folha: sem isso o Tab passeia pelo app atrás da
       folha, e o leitor de tela lê a tela errada. */
    if(e.key==='Tab' && aberta()){
      const f=[...raiz.querySelectorAll('a[href],button:not([disabled]),input:not([disabled]),select,textarea,[tabindex]:not([tabindex="-1"])')]
        .filter(el=>el.offsetParent!==null);
      if(!f.length) return;
      const pri=f[0], ult=f[f.length-1];
      if(e.shiftKey && document.activeElement===pri){ e.preventDefault(); ult.focus(); }
      else if(!e.shiftKey && document.activeElement===ult){ e.preventDefault(); pri.focus(); }
    }
  });

  /* 3. Trava a rolagem do fundo + devolve o foco a quem abriu.
     Um observador em vez de N chamadas: folha nova nasce já obedecendo. */
  let quemAbriu = null;
  new MutationObserver(()=>{
    const on = aberta();
    document.body.classList.toggle('vm-travado', on);
    if(on){
      if(!quemAbriu) quemAbriu = document.activeElement;
      /* leva o foco para dentro: sem isso o teclado continua lá atrás */
      const alvo = raiz.querySelector('input:not([type=hidden]), button, [tabindex]');
      if(alvo && !raiz.contains(document.activeElement)) setTimeout(()=>alvo.focus({preventScroll:true}),60);
    } else if(quemAbriu){
      /* devolve o foco ao botão que abriu — senão o teclado volta para o topo */
      try{ quemAbriu.focus({preventScroll:true}); }catch(e){}
      quemAbriu = null;
    }
  }).observe(raiz, { childList:true, subtree:false });
})();

   handler de TESTE — "Voltar para o plano Free? (teste)" — que sobrou de uma

   Removido: código de teste em produção é bug esperando o horário. */

/* ============================================================
   PWA — instalação e ATUALIZAÇÃO

   O problema que isto resolve (aparece só no celular):
   com o atalho na tela inicial, o app quase nunca "abre do zero" — você volta
   pelo alternador e ele apenas retoma da memória. Sem navegação, o service
   worker nunca procura versão nova, e o usuário roda código velho por dias
   sem saber. Registrar e esquecer não basta.

   Então: toda vez que o app volta ao foco, ele pergunta se há versão nova.
   Se houver, avisa e deixa o usuário decidir a hora — recarregar sozinho no
   meio de um lançamento seria pior que a versão antiga.
   ============================================================ */
if('serviceWorker' in navigator){
  let vmReg = null, vmAvisou = false;

  const avisarNovaVersao = () => {
    if(vmAvisou) return; vmAvisou = true;
    const b = document.createElement('button');
    b.className = 'vm-update';
    b.innerHTML = '✨ Nova versão do VIZIO Money — <b>tocar para atualizar</b>';
    b.onclick = () => {
      /* pede ao SW novo para assumir agora; o controllerchange recarrega */
      vmReg?.waiting?.postMessage({ type:'PULAR_ESPERA' });
      b.textContent = 'Atualizando…'; b.disabled = true;
      setTimeout(()=>location.reload(), 1200);   // rede de segurança
    };
    document.body.appendChild(b);
    requestAnimationFrame(()=> b.classList.add('on'));
  };

  window.addEventListener('load', async ()=>{
    try{
      vmReg = await navigator.serviceWorker.register('sw.js');

      /* Já tem versão nova parada esperando (instalou numa visita anterior) */
      if(vmReg.waiting && navigator.serviceWorker.controller) avisarNovaVersao();

      vmReg.addEventListener('updatefound', ()=>{
        const novo = vmReg.installing; if(!novo) return;
        novo.addEventListener('statechange', ()=>{
          /* 'installed' + já existe controller = é ATUALIZAÇÃO, não 1ª instalação */
          if(novo.state === 'installed' && navigator.serviceWorker.controller) avisarNovaVersao();
        });
      });

      /* O gatilho que faltava: procurar versão nova ao voltar para o app. */
      document.addEventListener('visibilitychange', ()=>{
        if(document.visibilityState === 'visible') vmReg?.update().catch(()=>{});
      });
      window.addEventListener('online', ()=> vmReg?.update().catch(()=>{}));
    }catch(e){ /* sem SW o app funciona igual, só perde o modo offline */ }
  });

  let recarregando = false;
  navigator.serviceWorker.addEventListener('controllerchange', ()=>{
    if(recarregando) return; recarregando = true; location.reload();
  });
}

render();
</script>
