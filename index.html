<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#06080F">
<title>VIZIO Money — VIZIO FINANCE</title>
<link rel="icon" href="brand/logo.svg">
<link rel="apple-touch-icon" href="brand/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="brand.css?v=2.2">
<style>
*{margin:0;padding:0;box-sizing:border-box}
/* Rede de segurança: nada empurra a página para o lado. `clip` e não `hidden`
   de propósito — `hidden` cria um contêiner de rolagem e quebra o position:sticky
   da topbar e da faixa de meses. As causas do estouro estão corrigidas abaixo
   (tabelas, panorama, faixa de meses); isto aqui é o cinto de segurança. */
html{overflow-x:clip;max-width:100%}
/* A luz da página vem do MODO AURA v3 (aura.js) — não de gradientes locais. */
body{font-family:var(--font);color:var(--s600);background:var(--bg);-webkit-tap-highlight-color:transparent;overflow-x:clip}
h1,h2,h3,.disp{font-family:var(--font-display);color:var(--ink);letter-spacing:-.02em;line-height:1.15}
.num{font-variant-numeric:tabular-nums lining-nums}
button{font-family:inherit;cursor:pointer}
/* 16px é obrigatório: abaixo disso o iOS dá zoom automático ao focar o campo. */
input,select{font-family:inherit;font-size:16px}
.hide{display:none!important}

/* App shell */
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;justify-content:space-between;
  padding:12px 18px;background:rgba(6,8,15,.72);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topbar .right{display:flex;align-items:center;gap:10px}
.plan-chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--r-full)}
.plan-free{color:var(--s600);background:var(--s100);border:1px solid var(--line)}
.plan-pro{color:var(--gold);background:var(--gold-soft);border:1px solid rgba(201,169,104,.4)}
.plan-master{color:#06080F;background:var(--grad-gold);border:1px solid transparent;font-weight:800;letter-spacing:.06em}

/* Faixa de pagamento pendente (carência) — padrão Vizio Finance */
.vm-banner{position:sticky;top:58px;z-index:29;display:flex;align-items:center;justify-content:center;gap:12px;
  padding:10px 18px;font-size:13px;font-weight:600;color:#F5D89A;
  background:rgba(201,169,104,.12);border-bottom:1px solid rgba(201,169,104,.35)}
@media(max-width:640px){.vm-banner{flex-direction:column;gap:8px;text-align:center}}

/* Tela de acesso */
.vm-tabs{display:flex;gap:6px;background:var(--coal);border:1px solid var(--line);border-radius:12px;padding:4px;margin:14px 0}
.vm-tab{flex:1;border:none;background:transparent;color:var(--s500);font-family:inherit;font-weight:700;font-size:13px;
  padding:10px;border-radius:9px;cursor:pointer}
.vm-tab.on{background:var(--grad-brand);color:#fff}
.vm-field{text-align:left;margin-bottom:11px}
.vm-field label{display:block;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--s500);margin-bottom:5px}
.vm-field input{width:100%;padding:13px 14px;border:1px solid var(--line2);border-radius:10px;
  background:var(--coal);color:var(--ink);font-size:16px}
.vm-field input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(28,100,240,.18)}
/* Exibir senha: no celular, digitar às cegas é a principal fonte de erro. */
.vm-pw{position:relative}
.vm-pw input{padding-right:48px}
.vm-eye{position:absolute;right:4px;top:50%;transform:translateY(-50%);
  width:40px;height:40px;display:grid;place-items:center;border:none;background:transparent;
  color:var(--s500);cursor:pointer;border-radius:8px}
.vm-eye:hover{color:var(--brand-2)}
.vm-eye:focus-visible{outline:2px solid var(--brand);outline-offset:-2px}
@media (pointer:coarse),(max-width:820px){ .vm-eye{width:44px;height:44px} .vm-pw input{padding-right:52px} }
.vm-err{display:none;background:var(--neg-bg);border:1px solid rgba(240,97,109,.4);color:#F0616D;
  border-radius:10px;padding:9px 12px;font-size:12.5px;margin-bottom:10px;text-align:left}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--s600);font-size:16px;display:flex;align-items:center;justify-content:center}
/* Selo de sincronização: no celular vira só o ícone (texto some) para não
   brigar com o espaço da topbar. */
.sync-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
  color:var(--s500);white-space:nowrap;padding:0 2px}
@media(max-width:640px){ .sync-chip .sync-tx{display:none} .sync-chip{font-size:14px} }

.wrap{max-width:1080px;margin:0 auto;padding:18px 18px 120px}

/* Month strip */
.monthstrip{display:flex;gap:7px;overflow-x:auto;padding:14px 2px 6px;scrollbar-width:none}
.monthstrip::-webkit-scrollbar{display:none}
.mbtn{flex:0 0 auto;padding:8px 14px;border-radius:var(--r-full);border:1px solid var(--line);background:var(--surface);
  color:var(--s600);font-weight:600;font-size:13px;position:relative}
.mbtn.active{background:var(--grad-brand);color:#fff;border-color:transparent;box-shadow:0 4px 18px rgba(28,100,240,.45);font-weight:700}
.mbtn.locked{opacity:.5}
.mbtn .lk{font-size:9px;margin-left:4px}

/* Cards & grid */
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:820px){.g2,.g3,.g4{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--sh-sm)}
.card h3{font-size:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
.card h3 .sub{font-family:var(--font);font-weight:600;font-size:12px;color:var(--s500)}

/* KPI */
.kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:820px){.kpi{grid-template-columns:1fr 1fr}}
.kpi .box{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:14px 16px;box-shadow:var(--sh-sm)}
.kpi .lab{font-size:11px;font-weight:600;color:var(--s500);display:flex;align-items:center;gap:6px}
.kpi .val{font-family:var(--font-display);font-weight:800;font-size:24px;margin-top:6px;letter-spacing:-.02em}
/* .brandc usa --brand-2 e não --brand: #1C64F0 como TEXTO dá 3,94:1 e reprova.
   REGRA: --brand é cor de PREENCHIMENTO (botão, barra, anel). Como texto sobre
   fundo escuro, sempre --brand-2. */
.pos{color:var(--pos)} .neg{color:var(--neg)} .warn{color:var(--warn)} .brandc{color:var(--brand-2)}
.dot{width:8px;height:8px;border-radius:3px}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--s500);font-weight:700;padding:6px 8px;border-bottom:1px solid var(--line)}
td{padding:8px;border-bottom:1px solid var(--line);color:var(--s700)}
tr:last-child td{border-bottom:none}
.rowdel{color:var(--s400);border:none;background:none;font-size:15px;padding:2px 6px;border-radius:6px}
.rowdel:hover{color:var(--neg);background:var(--neg-bg)}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:var(--r-full);background:var(--s100);color:var(--s600)}
/* Era --brand-deep (#1450C8): azul ESCURO sobre fundo quase preto, ~1,7:1.
   Sobra do tema claro que sobreviveu à virada para o dark. É a tag "crédito"
   — a informação que diz se o gasto vira fatura. Agora --brand-2 (7,54:1). */
.tag.credit{background:var(--brand-soft);color:var(--brand-2)}
.empty{color:var(--s400);font-size:13px;padding:14px 4px;text-align:center}

/* Forms */
.addrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;align-items:center}
.addrow input,.addrow select{padding:9px 11px;border:1px solid var(--line2);border-radius:10px;background:var(--surface);color:var(--ink);min-width:0}
.addrow input[type=date]{color:var(--s600)}
.addrow .f-desc{flex:2;min-width:120px} .addrow .f-num{width:110px} .addrow .f-sel{flex:1;min-width:110px} .addrow .f-sm{width:90px}

/* Campo de data mascarado + calendário nativo escondido atrás do 📅 */
.dt-wrap{position:relative;display:inline-flex;align-items:center;width:118px;flex:0 0 auto}
.dt-wrap input.date{width:100%;padding-right:32px !important;font-variant-numeric:tabular-nums}
.dt-native{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;bottom:0;left:12px;border:0;padding:0}
.dt-btn{position:absolute;right:4px;top:50%;transform:translateY(-50%);border:none;background:none;
  font-size:14px;line-height:1;padding:4px;border-radius:6px;color:var(--s500);cursor:pointer}
.dt-btn:hover{background:var(--s100)}
.btn{border:none;border-radius:10px;padding:9px 15px;font-weight:700;font-size:13px;color:#fff;background:var(--grad-brand);box-shadow:var(--sh-sm)}
.btn:hover{filter:brightness(1.08)} .btn:active{transform:translateY(1px)}
.btn-ghost{background:transparent;color:var(--brand-2);border:1px solid var(--line2)}
.btn-sm{padding:6px 11px;font-size:12px}
/* Ouro = dinheiro: só para assinar/valor. Nunca para ação comum. */
.btn-money{background:var(--grad-gold);color:#06080F}

/* Budget moon list */
.budline{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line)}
.budline:last-child{border-bottom:none}
.moon{font-size:18px;line-height:1}
.budmeta{font-size:12px;color:var(--s500)}
.budcat{font-weight:600;color:var(--s700);font-size:13px}
.bar{height:6px;border-radius:4px;background:var(--s100);overflow:hidden;margin-top:5px}
.bar > i{display:block;height:100%;border-radius:4px}

/* ==========================================================================
   NAVEGAÇÃO — barra inferior no celular · menu lateral no desktop
   Um só HTML alimenta as duas; o CSS decide qual aparece.
   ========================================================================== */
.bottomnav,.sidenav{display:none}
.nav-i{display:flex;align-items:center;border:none;background:transparent;cursor:pointer;
  color:var(--s500);font-family:inherit;font-weight:600;position:relative;transition:color .15s}
/* ícone de traço (SVG), não emoji: herda a cor do estado ativo */
.nav-ic{display:flex;align-items:center;justify-content:center}
.nav-ic svg{width:22px;height:22px;display:block}
.nav-i.on{color:var(--gold)}

/* --- Celular: barra fixa embaixo, no alcance do polegar --- */
@media(max-width:820px){
  .bottomnav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:rgba(6,8,15,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);
    padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
  .bottomnav .nav-i{flex:1;flex-direction:column;gap:4px;min-height:54px;justify-content:center;font-size:9.5px}
  .bottomnav .nav-ic svg{width:21px;height:21px}
  .bottomnav .nav-i.on::before{content:"";position:absolute;top:-7px;left:50%;transform:translateX(-50%);
    width:26px;height:3px;border-radius:0 0 3px 3px;background:var(--grad-gold)}
  .wrap{padding-bottom:calc(96px + env(safe-area-inset-bottom))}
}

/* --- Desktop: menu lateral fixo (padrão VIZIO Finance) --- */
@media(min-width:821px){
  .sidenav{display:flex;flex-direction:column;gap:4px;position:fixed;left:0;top:58px;bottom:0;width:186px;
    z-index:20;padding:16px 12px;border-right:1px solid var(--line);background:rgba(14,20,34,.5)}
  .sidenav .nav-i{gap:11px;padding:11px 12px;border-radius:10px;font-size:13.5px;justify-content:flex-start}
  .sidenav .nav-i:hover{background:var(--coal);color:var(--warm)}
  .sidenav .nav-i.on{background:rgba(201,169,104,.10);color:var(--gold)}
  .sidenav .nav-i.on::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;
    border-radius:0 3px 3px 0;background:var(--grad-gold)}

  /* A centralização do conteúdo mora no FIM desta folha (busque por
     "PADRÃO VIZIO · CENTRALIZAÇÃO"). Precisa ficar lá por causa da cascata:
     `.foot` redefine `margin` com shorthand mais adiante e venceria daqui. */
  .topbar{padding-left:26px}
}

/* --- Sinais na barra de navegação ---
   (As abas de módulo e o cabeçalho de mês foram REMOVIDOS no redesign v2:
   eram uma 2ª camada de menu e uma caixa de ajuste na frente do conteúdo.
   Os badges sobreviveram porque resolvem um problema real: ao dividir em abas,
   o que está fora da tela deixa de existir.) */
.nav-i{position:relative}
.nav-badge{position:absolute;top:-5px;right:-9px;background:var(--neg);color:#fff;font-size:9.5px;
  font-weight:800;border-radius:99px;padding:1px 5px;min-width:16px;text-align:center;line-height:1.5}
.nav-dot{position:absolute;top:-2px;right:-5px;width:7px;height:7px;border-radius:50%;
  background:var(--gold);box-shadow:0 0 7px rgba(201,169,104,.8)}
.nav-ic{position:relative}

/* Alerta de categoria: precisa gritar, não sussurrar */
.vm-alerta{display:flex;align-items:center;gap:11px;margin:0 0 12px;padding:11px 13px;border-radius:11px;
  background:rgba(240,97,109,.12);border:1px solid rgba(240,97,109,.45);
  animation:vmAlerta 2s ease-in-out infinite}
.vm-alerta-ic{flex:none;width:26px;height:26px;border-radius:50%;background:var(--neg);color:#fff;
  display:grid;place-items:center;font-weight:800;font-size:15px}
.vm-alerta b{color:#FFB3B9;font-size:13px}
.vm-alerta div div{font-size:11.5px;color:var(--s500)}
@keyframes vmAlerta{0%,100%{box-shadow:0 0 0 0 rgba(240,97,109,0)}50%{box-shadow:0 0 0 5px rgba(240,97,109,.13)}}
.budline.estourou .budcat{color:#FFB3B9}
.tag-estouro{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:#fff;background:var(--neg);border-radius:99px;padding:1px 6px;margin-left:5px;vertical-align:1px}

/* Destaque ao chegar via CTA da IA */
.vm-destaque{outline:2px solid var(--gold);outline-offset:3px;transition:outline .2s}

/* Mês sem lançamento no gráfico */
.chart .c.vazio{opacity:.3}
.f-mini{width:62px;padding:6px 8px;border:1px solid var(--line2);border-radius:7px;background:var(--coal);color:var(--ink);font-size:14px}
tfoot td{border-top:1px solid var(--line2);padding-top:9px}

/* IA de Reflexão */
.card.reflex{border-color:rgba(201,169,104,.32)}
.card.reflex h3 span:first-child{color:var(--gold)}
.rfx-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.rfx-grid{grid-template-columns:1fr}}
.rfx{background:var(--coal);border:1px solid var(--line);border-radius:13px;padding:14px 16px}
.rfx-tag{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.rfx-t{font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--warm);margin-bottom:5px;line-height:1.25}
.rfx-d{font-size:13px;color:var(--mineral);line-height:1.5}
.rfx-cta{margin-top:11px}

/* Panorama */
.pano{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px}
.pano .col{flex:0 0 auto;width:64px;text-align:center}
.pano .colhead{font-size:11px;font-weight:700;color:var(--s500);margin-bottom:6px}
.pano .colbar{height:80px;display:flex;align-items:flex-end;justify-content:center}
.pano .colbar > i{width:24px;border-radius:6px 6px 0 0;background:var(--grad-brand);min-height:3px}
.pano .colval{font-size:10px;margin-top:5px;color:var(--s600)}
.pano .col.hot .colbar > i{background:linear-gradient(180deg,#E11D48,#F59E0B)}

/* Bar chart (annual) */
.chart{display:flex;gap:8px;align-items:flex-end;height:150px;padding-top:8px}
.chart .c{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.chart .c > i{width:70%;border-radius:6px 6px 0 0;min-height:2px;transition:height .3s}
.chart .c .lb{font-size:10px;color:var(--s500)}

/* Login / paywall overlay */
.overlay{position:fixed;inset:0;z-index:80;background:rgba(14,23,38,.42);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px}
.sheet{background:var(--surface);border-radius:22px;max-width:400px;width:100%;padding:28px 26px;box-shadow:var(--sh-lg);text-align:center}
.sheet h2{font-size:22px;margin-bottom:6px}
.sheet p{font-size:14px;color:var(--s500);margin-bottom:18px}
.sheet .price{font-family:var(--font-display);font-weight:800;font-size:34px;color:var(--ink);letter-spacing:-.02em}
.sheet .price small{font-size:14px;color:var(--s500);font-weight:600}
.sheet .btn{width:100%;padding:13px;font-size:15px;margin-top:8px}
.sheet .feat{text-align:left;margin:16px 0 8px;font-size:13px}
.sheet .feat div{display:flex;gap:8px;padding:5px 0;color:var(--s700)}
.sheet .feat .ck{color:var(--grow)}
.linklike{background:none;border:none;color:var(--s500);font-size:13px;margin-top:12px;text-decoration:underline}

/* toast + celebrate */
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;z-index:90;
  background:#1C2330;color:var(--warm);border:1px solid var(--line2);padding:11px 18px;border-radius:var(--r-full);font-size:13px;font-weight:600;
  box-shadow:var(--sh-lg);transition:.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.foot{max-width:1080px;margin:24px auto 0;padding:0 18px;color:var(--s400);font-size:11px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
.section-title{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--s500);margin:26px 0 10px}
@media (prefers-reduced-motion: reduce){*{transition:none!important}}

/* ==========================================================================
   LINGUAGEM v2 — "cara de app, não de sistema"
   Medição do que existia: 129 elementos na 1ª tela, 29 caixas com borda,
   21 controles, 7,8% de densidade de texto. O feed do Instagram mostra ~12.

   Três regras roubadas de quem já ganhou essa briga:
   1. SEPARAR COM ESPAÇO, NÃO COM LINHA. Toda borda é atenção cobrada do
      usuário sem entregar informação. No celular o card perde borda e fundo:
      vira só conteúdo respirando.
   2. UMA COISA POR VEZ. Nada lado a lado no celular.
   3. HIERARQUIA POR TAMANHO, NÃO POR CAIXA. O número importante é grande;
      o resto é pequeno e cinza. Sem moldura para "destacar".
   ========================================================================== */
@media(max-width:820px){
  .wrap{padding:8px 20px calc(110px + env(safe-area-inset-bottom))}
  /* o card deixa de ser caixa e vira seção */
  .card{background:transparent;border:none;box-shadow:none;padding:0;margin-bottom:34px}
  .card h3{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    color:var(--s400);margin-bottom:14px}
  .card h3 .sub{font-size:12px;letter-spacing:0;text-transform:none;color:var(--s500)}
  .grid{gap:0}
  /* respiro entre linhas da lista: 11px era aperto de planilha */
  .card tr{padding:15px 48px 15px 0}
  .card td{padding:2px 0}
  .section-title{margin:34px 0 12px}
}

/* ==========================================================================
   HOME — o número que respira
   Antes: grade de 4 KPIs + 12 meses + panorama + abas, tudo antes do 1º real
   lançado. Agora: UMA resposta ("posso gastar?") e o feed do que aconteceu.
   ========================================================================== */
.heroi{text-align:center;padding:26px 0 6px}
.heroi-lb{font-size:12px;color:var(--s500);font-weight:600;margin-bottom:10px}
.heroi-n{font-family:var(--font-display);font-weight:800;letter-spacing:-.035em;line-height:1;
  font-size:clamp(40px,12vw,58px);color:var(--warm)}
.heroi-n.neg{color:var(--neg)}
.heroi-ctx{font-size:12.5px;color:var(--s500);line-height:1.7;margin:12px auto 0;max-width:290px}
.heroi-ctx b{color:var(--s600);font-weight:600}

/* Seletor de mês: ‹ Julho › — 12 botões na tela era coisa de sistema.
   Toca no nome e escolhe; as setas resolvem 90% dos casos (mês vizinho). */
.mes-sel{display:flex;align-items:center;justify-content:center;gap:4px;padding:10px 0 0}
.mes-nav{width:40px;height:40px;border:none;background:transparent;color:var(--s500);
  font-size:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
.mes-nav:hover{background:var(--s100);color:var(--warm)}
.mes-nav:disabled{opacity:.25;cursor:default}

@media(max-width:820px){ .fab{bottom:calc(78px + env(safe-area-inset-bottom))} }

/* ==========================================================================
   PADRÃO VIZIO · CENTRALIZAÇÃO
   Todo sistema com menu lateral centraliza o conteúdo na ÁREA LIVRE (a tela
   menos a sidebar). A sidebar é MOLDURA, não conteúdo.

   Dois bugs que isto corrige, e ambos foram medidos no ar:
   1) `margin-left:186px` para "abrir espaço" ANULA o `auto` da esquerda — a
      centralização morre e o conteúdo cola na sidebar (desvio de -447px).
   2) `.foot` era `margin:24px auto 0`. Como esse shorthand aparece DEPOIS do
      bloco da sidebar, ele vencia a regra por ordem de cascata e o rodapé
      ficava centralizado na tela inteira, 93px fora do conteúdo.
      Por isso este bloco é o ÚLTIMO da folha: aqui nada o sobrescreve.

   A conta, para centralizar uma caixa W na região [S .. 100%]:
     esquerda = S + (100% - S)/2 - W/2  ->  50% - W/2 + S/2
   O max() impede que invada a sidebar em telas estreitas.
   ========================================================================== */
@media(min-width:821px){
  .wrap, .foot{
    margin-left: max(var(--sidenav-w),
                     calc(50% - (var(--wrap-max) / 2) + (var(--sidenav-w) / 2)));
    margin-right: auto;
  }
}

/* ==========================================================================
   REVISÃO MOBILE — o app vive no celular.
   Baseado em medição real: input 14px (zoom do iOS), botão de 28px de altura,
   ícones de 36px e ausência de safe-area.
   ========================================================================== */

/* 1. Safe area (notch / barra inferior do iPhone) */
.topbar{padding-top:calc(12px + env(safe-area-inset-top));
  padding-left:calc(18px + env(safe-area-inset-left));
  padding-right:calc(18px + env(safe-area-inset-right))}
.wrap{padding-left:calc(18px + env(safe-area-inset-left));
  padding-right:calc(18px + env(safe-area-inset-right));
  padding-bottom:calc(120px + env(safe-area-inset-bottom))}

/* 2. Alvos de toque ≥44px.
   Dupla trava de propósito: (pointer:coarse) pega o dedo em qualquer largura,
   e (max-width) pega híbridos/tablets/desktop-touch onde a detecção de ponteiro
   mente. Medição no desktop mostrou botão de 27px porque só a 1ª regra existia. */
@media (pointer:coarse), (max-width:820px){
  .btn{padding:13px 18px;font-size:14px;min-height:44px;
    display:inline-flex;align-items:center;justify-content:center}

  .addrow input,.addrow select{min-height:46px}

}

/* 3. Faixa dos meses fixa logo abaixo da topbar: trocar de mês é a ação nº1.
   No celular ela deixa de ser carrossel e vira grade 6x2: o ano inteiro à vista,
   sem rolagem lateral e sem precisar caçar Dezembro arrastando o dedo. */
@media(max-width:820px){
  .monthstrip{position:sticky;top:calc(58px + env(safe-area-inset-top));z-index:30;

/* 4. Formulários empilhados: no celular, campo lado a lado vira campo espremido */
@media(max-width:640px){

  .addrow .f-desc,.addrow .f-num,.addrow .f-sel,.addrow .f-sm{flex:1 1 100%;width:100%}

  .addrow input[type=date]{flex:1 1 calc(50% - 5px);width:auto}

}

/* 6. Tabela vira LISTA no celular — e a página para de andar de lado.
   Diagnóstico: tabela de 5 colunas não cabe em 360px. Pior, o próprio acerto de
   acessibilidade criou o bug: o ✕ ganhou alvo de toque de 44px e, somado às
   colunas fixas (data + pgto + valor), estourou a viewport e passou a empurrar
   a página inteira para o lado. Apertar fonte e padding só adiava o problema.
   Lista empilhada é o padrão dos apps financeiros no celular por um motivo:
   cada lançamento vira um bloco legível e a leitura só desce. */
@media(max-width:560px){

/* 7. Gráfico anual e panorama: 12 colunas NÃO cabem lado a lado em 360px.

<script>
/* ============================================================
   VIZIO MONEY — engine + UI  (v1, dados locais / offline)
   Preparado para futura sincronização com Supabase.
   ============================================================ */
const BRL = n => (n<0?'-':'')+'R$ '+Math.abs(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});

/* ============================================================
   MÁSCARAS — camada de superfície. A engine continua em Number/ISO.

   Dinheiro: o usuário digita SÓ dígitos e o valor se monta da direita para a
   esquerda (1234 vira 12,34). No celular isso vale ouro: teclado numérico,
   sem vírgula, sem ponto, impossível digitar letra ou dois separadores.
   `type=number` parecia resolver, mas em pt-BR ele briga com a vírgula, aceita
   "e"/"+"/"-" e ainda põe setinhas que no toque só atrapalham.

   Data: dd/mm/aaaa com barras automáticas. Mantemos o seletor NATIVO a um
   toque (botão 📅 -> showPicker) porque no celular o calendário do sistema é
   melhor que qualquer coisa que a gente desenhe — a máscara serve a quem
   prefere digitar, o picker serve a quem prefere tocar. Os dois, não um.
   ============================================================ */
const vmMoneyFmt = n => (Math.round((+n||0)*100)/100)
  .toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const vmMoneyVal = el => { const d=(el?.value||'').replace(/\D/g,''); return d ? (+d)/100 : null; };
function vmMoneyMask(el){
  const apply=()=>{ const d=(el.value||'').replace(/\D/g,'').slice(0,11);
    el.value = d ? (Number(d)/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) : ''; };
  const caretEnd=()=>{ try{ el.setSelectionRange(el.value.length, el.value.length);}catch(e){} };
  el.addEventListener('input', ()=>{ apply(); caretEnd(); });
  el.addEventListener('focus', ()=> setTimeout(caretEnd,0));
  apply();
}
const vmDateBR  = iso => { if(!iso) return ''; const p=String(iso).split('-');
  return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : ''; };
const vmDateISO = el => { const d=(el?.value||'').replace(/\D/g,''); if(d.length!==8) return '';
  const dd=+d.slice(0,2), mm=+d.slice(2,4), yy=+d.slice(4,8);
  if(dd<1||dd>31||mm<1||mm>12||yy<1900) return '';
  return `${d.slice(4,8)}-${d.slice(2,4)}-${d.slice(0,2)}`; };
function vmDateMask(el){
  const apply=()=>{ const d=(el.value||'').replace(/\D/g,'').slice(0,8);
    let out=d.slice(0,2);
    if(d.length>2) out+='/'+d.slice(2,4);
    if(d.length>4) out+='/'+d.slice(4,8);
    el.value=out; };
  el.addEventListener('input', apply); apply();
}
/* Campo de data = máscara + calendário nativo. Devolve o HTML pronto. */
function vmCampoData(id, cls='f-sm', extra=''){
  return `<span class="dt-wrap">
    <input type="text" class="date ${cls}" id="${id}" inputmode="numeric"
           placeholder="dd/mm/aaaa" maxlength="10" ${extra}>
    <input type="date" class="dt-native" id="${id}-pick" tabindex="-1" aria-hidden="true">
    <button type="button" class="dt-btn" data-pick="${id}" aria-label="Abrir calendário">📅</button>
  </span>`;
}
/* Liga tudo depois de cada render — idempotente via data-mk. */
function vmLigarMascaras(root=document){
  root.querySelectorAll('input.money:not([data-mk])').forEach(el=>{ el.dataset.mk=1; vmMoneyMask(el); });
  root.querySelectorAll('input.date:not([data-mk])').forEach(el=>{ el.dataset.mk=1; vmDateMask(el); });
  root.querySelectorAll('.dt-btn:not([data-mk])').forEach(b=>{
    b.dataset.mk=1;
    const txt=root.querySelector('#'+b.dataset.pick), nat=root.querySelector('#'+b.dataset.pick+'-pick');
    if(!txt||!nat) return;
    nat.onchange=()=>{ txt.value=vmDateBR(nat.value); txt.dispatchEvent(new Event('change',{bubbles:true})); };
    b.onclick=()=>{ const iso=vmDateISO(txt); if(iso) nat.value=iso;
      if(nat.showPicker) { try{ nat.showPicker(); return; }catch(e){} }
      nat.focus(); nat.click();   // navegadores sem showPicker
    };
  });
}
/* Rótulo honesto do saldo inicial: diz de onde o número veio. */
function vmOpeningTag(m,mm){
  if(mm.opening!==null&&mm.opening!=='') return 'ajustado por você';
  if(m===0) return 'comece por aqui';
  return mesEncerrado(m-1) ? `herdado de ${MABBR[m-1]}` : `${MABBR[m-1]} ainda em curso`;
}
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MABBR  = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
const KEY='vizio_money_v1';
const uid=()=>Math.random().toString(36).slice(2,9);

const DEFAULTS = {
  version:3, plan:'free', year:2026, current:new Date().getMonth(),
  nome:'',
  /* Cartão: venc = dia que a fatura vence · melhor = melhor dia de compra
     (dia seguinte ao fechamento — comprar nele dá o prazo máximo). */
  cards:[{nome:'C6',venc:10,melhor:1},{nome:'Nu',venc:10,melhor:1},{nome:'MP',venc:10,melhor:1},
         {nome:'C&A',venc:10,melhor:1},{nome:'RCHL',venc:10,melhor:1}],
  categories:['Moradia','Apartamento','Assinaturas','Saúde','Alimentação','Lazer','Uber','Beleza','Roupas','Presentes','Essencial','Contas de Casa','Educação','Lanches','Imprevistos','Outros'],
  payments:['Pix','Débito'], /* + cartões (crédito) são adicionados dinamicamente */
  budgets:{Moradia:100,Apartamento:3000,Assinaturas:100,'Saúde':200,'Alimentação':600,Lazer:100,Uber:50,Beleza:100,Roupas:100,Presentes:100,Essencial:300,'Contas de Casa':250,'Educação':100,Lanches:80,Imprevistos:150,Outros:50},
  months:{}, /* m -> {opening:null, incomes:[], investments:[], expenses:[]} */
  purchases:[], /* parceladas globais: {id,cat,desc,card,value,parcelas,start} */
  hourlyWage:null, /* R$/hora p/ custo de oportunidade; null = estimado da renda */
  /* "quanto eu ganho, quanto eu gasto e quanto eu DEVO" — o terceiro faltava.
     {id,nome,saldo,juros(% a.m.),parcela(mínima mensal),criada} */
  dividas:[],
  /* Meta PUXA (faltam R$340 para o Natal); teto SEGURA (não passe de R$600).
     São coisas diferentes e por isso não moram no mesmo lugar.
     {id,nome,alvo,prazo:'YYYY-MM',guardado,criada} */
  metas:[],
  updatedAt:0      /* carimbo do cliente — decide quem vence no sync (last-write-wins) */
};

let S = load();
function load(){ try{const r=JSON.parse(localStorage.getItem(KEY)); if(r&&r.version) return migrate(r);}catch(e){} return structuredClone(DEFAULTS); }
function migrate(r){
  for(const k in DEFAULTS) if(!(k in r)) r[k]=structuredClone(DEFAULTS[k]);
  /* v1 -> v2: cartão era só o nome; agora carrega vencimento e melhor dia. */
  if(Array.isArray(r.cards) && r.cards.length && typeof r.cards[0]==='string'){
    r.cards = r.cards.map(n=>({nome:n, venc:10, melhor:1}));
  }
  /* v1 -> v2: todo investimento antigo é aporte (não existia resgate). */
  for(const k in r.months){
    const mm=r.months[k];
    if(Array.isArray(mm.investments)) mm.investments.forEach(i=>{ if(!i.tipo) i.tipo='aporte'; });
  }
  /* v2 -> v3: nasceram dívidas e metas. O laço lá em cima já cria as duas
     listas vazias para quem já usava; explícito aqui só para não depender de
     efeito colateral — e porque quem lê este arquivo daqui a um ano merece
     saber quando cada coisa entrou. */
  if(!Array.isArray(r.dividas)) r.dividas=[];
  if(!Array.isArray(r.metas))   r.metas=[];
  r.version = 3;
  return r;
}
/* O localStorage virou CACHE. A fonte de verdade é a nuvem (vm_dados), senão
   trocar de celular apaga a vida financeira do cliente — e aí os R$ 9,90
   viram reembolso. vmNuvemAgendar vive no auth.js e ignora chamada sem login. */
function save(){
  localStorage.setItem(KEY, JSON.stringify(S));
  if(window.vmNuvemAgendar) window.vmNuvemAgendar();
}
function month(m){ if(!S.months[m]) S.months[m]={opening:null,incomes:[],investments:[],expenses:[]}; return S.months[m]; }
const cardNames   = () => S.cards.map(c=>c.nome);
const getCard     = n  => S.cards.find(c=>c.nome===n);
const creditMethods = () => cardNames();
const allPayments = () => [...S.payments, ...cardNames()];
const isCredit    = pay => cardNames().includes(pay);

/* Em que mês a compra vira fatura, usando a MELHOR DATA DE COMPRA.
   Regra real do cartão: a melhor data é o dia seguinte ao fechamento.
     compra ANTES da melhor data  -> entra na fatura que fecha já, vence mês+1
     compra A PARTIR da melhor data -> pega o ciclo seguinte, vence mês+2
   É exatamente por isso que comprar na melhor data dá o prazo máximo. */
function mesDaFatura(dataISO, cardNome){
  const d = new Date((dataISO||today(S.current))+'T12:00:00');
  if(isNaN(d)) return S.current+1;
  const melhor = +(getCard(cardNome)?.melhor || 1);
  let m = d.getMonth() + 1;                    // fatura seguinte à compra
  if(melhor > 1 && d.getDate() >= melhor) m += 1;
  return m;
}

/* ---------- ENGINE ---------- */
function installmentItems(m){ // parcelas ativas no mês m (a partir das compras globais)
  const out=[];
  for(const p of S.purchases){
    const n = m - p.start + 1;
    if(n>=1 && n<=p.parcelas) out.push({cat:p.cat,desc:p.desc,card:p.card,value:+p.value,n,of:p.parcelas,pid:p.id});
  }
  return out;
}
function monthExpenseItems(m){ // gastos avulsos + parcelas do mês
  const mm=month(m);
  const one = mm.expenses.map(e=>({...e, kind:'one'}));
  const ins = installmentItems(m).map(e=>({cat:e.cat,desc:e.desc+` (${e.n}/${e.of})`,pay:e.card,value:e.value,kind:'ins'}));
  return [...one, ...ins];
}
const incomesTotal = m => month(m).incomes.reduce((s,x)=>s+ +x.value,0);

/* Investimento tem dois sentidos: aporte SAI da conta, resgate VOLTA pra ela. */
const investAportes  = m => month(m).investments.filter(i=>i.tipo!=='resgate').reduce((s,x)=>s+ +x.value,0);
const investResgates = m => month(m).investments.filter(i=>i.tipo==='resgate').reduce((s,x)=>s+ +x.value,0);
const investTotal    = m => investAportes(m) - investResgates(m);   // líquido que sai da conta
/* Patrimônio investido acumulado até o mês (o que está lá fora, rendendo). */
const patrimonio = m => { let t=0; for(let i=0;i<=m;i++) t+=investTotal(i); return t; };

/* USO DO CARTÃO no mês m: o que você passou no crédito AGORA.
   Isto NÃO sai da conta em m — vira a fatura que vence em m+1. */
function cardSpend(card,m){
  let t=0;
  for(const e of month(m).expenses) if(e.pay===card) t+=+e.value;
  for(const e of installmentItems(m)) if(e.card===card) t+=+e.value;
  return t;
}
const usoCartaoTotal = m => S.cards.reduce((s,c)=>s+cardSpend(c.nome,m),0);

/* FATURA A PAGAR em m: por competência, é o uso do mês ANTERIOR.
   Por isso o que você lança hoje nunca aparece aqui — aparece no Uso. */
const faturaCard   = (card,m) => m<=0?0:cardSpend(card,m-1);
const faturasTotal = m => S.cards.reduce((s,c)=>s+faturaCard(c.nome,m),0);

/* Mês "vazio" não deve herdar saldo na visão anual: dá falsa sensação de caixa. */
function mesTemMovimento(m){
  const mm=month(m);
  return mm.incomes.length>0 || mm.expenses.length>0 || mm.investments.length>0
      || installmentItems(m).length>0 || (mm.opening!==null && mm.opening!=='');
}
function nonCreditOut(m){ let t=0; for(const e of month(m).expenses) if(!isCredit(e.pay)) t+=+e.value; return t; }
const cashOut = m => nonCreditOut(m) + faturasTotal(m); // o que sai da conta no mês
/* Um mês só "entrega" seu saldo para o seguinte depois que ELE acaba.
   Antes disso o saldo do mês corrente ainda está vivo — todo gasto até o dia 31
   ainda o altera. Propagar um número que ainda vai mudar enche os meses futuros
   de um caixa que não existe, e é justamente aí que a pessoa decide gastar.
   Saldo herdado é fato consumado, não previsão. */
function mesEncerrado(m){
  const hoje = new Date();
  if(S.year < hoje.getFullYear()) return true;    // ano passado: tudo fechado
  if(S.year > hoje.getFullYear()) return false;   // ano futuro: nada fechado
  return m < hoje.getMonth();                     // ano corrente: só os já vencidos
}
function effOpening(m){
  const mm=month(m);
  if(mm.opening!==null&&mm.opening!=='') return +mm.opening;  // ajuste manual manda
  if(m===0) return 0;
  if(!mesEncerrado(m-1)) return 0;                // mês anterior ainda em curso
  return saldoFinal(m-1);
}
/* investTotal já é líquido: aporte sai, resgate volta (fica negativo e soma). */
function saldoFinal(m){ return effOpening(m) + incomesTotal(m) - cashOut(m) - investTotal(m); }
function categoryReal(cat,m){ let t=0; for(const e of monthExpenseItems(m)) if(e.cat===cat) t+=+e.value; return t; }
function panorama(){ // 12 meses -> total parcelas + qtd
  return [...Array(12)].map((_,m)=>{ const it=installmentItems(m); return {total:it.reduce((s,x)=>s+x.value,0), count:it.length}; });
}
/* fase da lua conforme % do teto */
function moon(ratio){
  if(ratio>=1)    return {g:'●',c:'var(--moon-4)',label:'estourou'};
  if(ratio>=0.75) return {g:'◕',c:'var(--moon-3)',label:'atenção'};
  if(ratio>=0.5)  return {g:'◑',c:'var(--moon-2)',label:'metade'};
  if(ratio>=0.25) return {g:'◔',c:'var(--moon-1)',label:'tranquilo'};
  return {g:'○',c:'var(--moon-0)',label:'folga'};
}
const barColor = r => r>=1?'var(--neg)':r>=0.75?'var(--warn)':'var(--grow)';
/* Arco de Clareza — motivo-assinatura (substitui as fases da lua) */
function clarityArc(ratio){
  const f=Math.max(0,Math.min(1,ratio||0));
  const cx=23,cy=26,r=19, th=Math.PI*(1-f);
  const x=(cx+r*Math.cos(th)).toFixed(1), y=(cy-r*Math.sin(th)).toFixed(1);
  const col = ratio>=1?'var(--arc-4)':ratio>=0.75?'var(--arc-3)':'var(--arc-2)';
  const fill = f<=0 ? '' : `<path d="M4 26 A19 19 0 0 1 ${x} ${y}" fill="none" stroke="${col}" stroke-width="4" stroke-linecap="round"/>`;
  return `<svg width="42" height="27" viewBox="0 0 46 30" aria-hidden="true"><path d="M4 26 A19 19 0 0 1 42 26" fill="none" stroke="var(--arc-track)" stroke-width="4" stroke-linecap="round"/>${fill}</svg>`;
}

/* ============================================================
   DÍVIDAS — motor de quitação
   O documento chama isto de "opção principal", e com razão: é a diferença
   entre vender controle (para quem já se controla) e vender saída (para quem
   está afogado).

   Duas estratégias, e o app mostra as DUAS porque elas resolvem problemas
   diferentes:
   · AVALANCHE  — mata primeiro o juro mais alto. É a ótima matematicamente:
                  paga menos juros e termina antes.
   · BOLA DE NEVE — mata primeiro o saldo menor. Perde dinheiro, mas entrega
                  a primeira vitória mais cedo — e quem desiste no mês 3 não
                  colhe a economia do mês 40. Motivação é variável do problema.

   O efeito "bola de neve": quando uma dívida morre, a parcela dela NÃO volta
   para o bolso — rola para a próxima. É isso que acelera tudo no fim.
   ============================================================ */
function simularQuitacao(lista, extra, estrategia){
  const ds = (lista||[]).map(d=>({
    id:d.id, nome:d.nome,
    saldo:+d.saldo||0, juros:+d.juros||0, parcela:+d.parcela||0
  })).filter(d=>d.saldo>0.01);
  if(!ds.length) return { meses:0, juros:0, quitadas:[], impossivel:false, pago:0 };

  /* A capacidade não encolhe quando uma dívida morre — a parcela dela rola
     para a próxima. Esse é o motor da bola de neve. */
  const capacidade = ds.reduce((s,d)=>s+d.parcela,0) + (+extra||0);
  const quitadas=[]; let meses=0, jurosTotal=0, pago=0;
  const MAX=600;   /* 50 anos: além disso é "nunca", e o app tem que dizer */

  while(ds.some(d=>d.saldo>0.01) && meses<MAX){
    meses++;
    /* 1. juros do mês incidem antes do pagamento */
    ds.forEach(d=>{ if(d.saldo>0.01){ const j=d.saldo*(d.juros/100); d.saldo+=j; jurosTotal+=j; } });

    /* 2. paga o mínimo de cada uma (senão a dívida entra em atraso) */
    let pote = capacidade;
    ds.forEach(d=>{ if(d.saldo>0.01 && pote>0.01){
      const p=Math.min(d.saldo, d.parcela, pote); d.saldo-=p; pote-=p; pago+=p; } });

    /* 3. TODA a sobra vai para o alvo da estratégia */
    let guarda=0;
    while(pote>0.01 && guarda++<50){
      const vivos = ds.filter(d=>d.saldo>0.01);
      if(!vivos.length) break;
      const alvo = estrategia==='avalanche'
        ? vivos.reduce((a,b)=> b.juros>a.juros ? b : a)
        : vivos.reduce((a,b)=> b.saldo<a.saldo ? b : a);
      const p=Math.min(alvo.saldo, pote); alvo.saldo-=p; pote-=p; pago+=p;
    }

    ds.forEach(d=>{ if(d.saldo<=0.01 && !quitadas.some(q=>q.id===d.id))
      quitadas.push({id:d.id, nome:d.nome, mes:meses}); });
  }

  /* O caso mais importante e o que ninguém mostra: quando a parcela não cobre
     nem os juros, o saldo CRESCE. É o rotativo. Mentir aqui é o pior que o app
     pode fazer com quem está afogado. */
  return { meses, juros:jurosTotal, quitadas, pago, capacidade, impossivel: meses>=MAX };
}

const dividaTotal   = () => (S.dividas||[]).reduce((s,d)=>s+ (+d.saldo||0), 0);
const dividaParcela = () => (S.dividas||[]).reduce((s,d)=>s+ (+d.parcela||0), 0);
/* A dívida que está te sangrando mais em R$ por mês — não a maior. */
function dividaPior(){
  const l=(S.dividas||[]).filter(d=>+d.saldo>0);
  if(!l.length) return null;
  return l.reduce((a,b)=> (b.saldo*b.juros) > (a.saldo*a.juros) ? b : a);
}
/* Já cobre os juros? Se não, é rotativo: a dívida cresce mesmo pagando. */
function dividaAfoga(d){ return (+d.parcela||0) <= (+d.saldo||0)*((+d.juros||0)/100); }

/* ============================================================
   METAS — o que puxa
   ============================================================ */
function metaCalc(g){
  const alvo=+g.alvo||0, feito=+g.guardado||0;
  const falta=Math.max(0, alvo-feito);
  const pct = alvo>0 ? Math.min(100, Math.round(feito/alvo*100)) : 0;
  let meses=null, porMes=null, atrasada=false;
  if(g.prazo){
    const [ay,am]=g.prazo.split('-').map(Number);
    const hoje=new Date();
    meses = (ay - hoje.getFullYear())*12 + (am - (hoje.getMonth()+1));
    if(meses<=0){ atrasada = falta>0; meses=Math.max(0,meses); }
    porMes = meses>0 ? falta/meses : falta;
  }
  return { alvo, feito, falta, pct, meses, porMes, atrasada, pronta: falta<=0.01 };
}

/* ============================================================
   IA DE REFLEXÃO — motor de regras (offline, sem backend)
   Custo de oportunidade · assinaturas · pague-se primeiro ·
   alertas · curto/médio/longo prazo. Pronto p/ plugar LLM depois.
   ============================================================ */
function estHourly(){
  if(+S.hourlyWage>0) return +S.hourlyWage;
  let tot=0,cnt=0; for(let i=0;i<12;i++){const inc=incomesTotal(i); if(inc>0){tot+=inc;cnt++;}}
  const avg = cnt? tot/cnt : 0;
  return avg>0 ? avg/176 : 20;   /* 176h úteis/mês; fallback R$20/h */
}
function fvMonthly(monthly,years,rate){ const A=monthly*12; return A*((Math.pow(1+rate,years)-1)/rate); }
const pct = (a,b)=> b>0? Math.round((a/b)*100):0;
function reflexoes(m){
  const out=[], hw=estHourly();

  /* DÍVIDA VEM PRIMEIRO — e por matemática, não por moral.
     Investir a 10% ao ano enquanto se paga 14% ao mês é perder dinheiro com
     disciplina. Nenhum outro conselho importa antes deste. */
  const pior = dividaPior();
  if(pior){
    const jm = (+pior.saldo)*((+pior.juros)/100);
    if(dividaAfoga(pior)){
      out.push({tag:'Dívida', target:'dividas',
        t:`${pior.nome} está no rotativo`,
        d:`A parcela de <b>${BRL(+pior.parcela)}</b> não cobre nem os <b>${BRL(jm)}</b> de juros do mês. O saldo cresce mesmo você pagando em dia. Isso não é indisciplina — é matemática, e tem saída.`,
        cta:'Ver como sair'});
    } else if(jm > 20){
      out.push({tag:'Dívida', target:'dividas',
        t:`${pior.nome} te custa ${BRL(jm)} por mês`,
        d:`Só de juros, sem abater nada. São <b>${BRL(jm*12)} por ano</b> — ${hw?`<b>${(jm/hw).toFixed(1)} horas</b> do seu trabalho todo mês`:'dinheiro que evapora'}. Atacar essa primeiro rende mais que qualquer investimento.`,
        cta:'Ver estratégia de quitação'});
    }
  }

  /* Meta com prazo apertado: o empurrão vale mais que o elogio. */
  const gs=(S.metas||[]).map(g=>({g,k:metaCalc(g)})).filter(x=>!x.k.pronta && x.k.meses!==null);
  const urgente = gs.filter(x=>x.k.meses>0 && x.k.meses<=3).sort((a,b)=>a.k.meses-b.k.meses)[0];
  if(urgente) out.push({tag:'Meta', target:'invest',
    t:`Faltam ${urgente.k.meses} ${urgente.k.meses===1?'mês':'meses'} para ${urgente.g.nome}`,
    d:`Você tem <b>${BRL(urgente.k.feito)}</b> de <b>${BRL(urgente.k.alvo)}</b>. Para chegar no prazo, são <b>${BRL(urgente.k.porMes)}</b> por mês.`,
    cta:'Ver minhas metas'});
  const tot={}; for(const e of monthExpenseItems(m)) tot[e.cat]=(tot[e.cat]||0)+ +e.value;
  const top=Object.entries(tot).sort((a,b)=>b[1]-a[1])[0];
  if(top && top[1]>0){
    const [cat,val]=top, hrs=hw?val/hw:0, fv=fvMonthly(val,10,0.10);
    out.push({tag:'Custo de oportunidade', target:'base',
      t:`${cat}: ${BRL(val)} neste mês`,
      d:`Equivale a <b>${hrs.toFixed(1)} horas</b> do seu trabalho. Mantido todo mês e investido a ~10%/ano, em 10 anos viraria <b>${BRL(fv)}</b>.`,
      cta:`Definir um teto para ${cat}`});
  }
  const assin=categoryReal('Assinaturas',m);
  if(assin>0) out.push({tag:'Assinaturas', target:'base',
    t:`${BRL(assin)}/mês em assinaturas`,
    d:`São <b>${BRL(assin*12)} por ano</b>. Cortar o que você não usou nas últimas 2 semanas já monta parte da sua reserva.`,
    cta:'Revisar assinaturas'});
  const estouradas=S.categories.filter(c=>{const t=+(S.budgets[c]||0);return t>0 && categoryReal(c,m)/t>=1;});
  if(estouradas.length) out.push({tag:'Alerta', target:'orcamento',
    t:`${estouradas.length} categoria(s) no limite`,
    d:`<b>${estouradas.slice(0,3).join(', ')}</b> estourou o teto — o Arco de Clareza está cheio. Hora de segurar até o fim do mês.`,
    cta:'Ver orçamento'});
  const inv=investTotal(m), inc=incomesTotal(m);
  if(inc>0 && inv<inc*0.1){ const sug=inc*0.1;
    out.push({tag:'Pague-se primeiro', target:'invest',
      t:`Você guardou ${pct(inv,inc)}% da renda`,
      d:`A meta saudável começa em <b>10%</b>. Guardar <b>${BRL(sug)}</b>/mês, investido, vira <b>${BRL(fvMonthly(sug,10,0.10))}</b> em 10 anos.`,
      cta:'Registrar um investimento'}); }
  if(m>0){ const cur=faturasTotal(m), prev=faturasTotal(m-1);
    if(prev>0 && cur>prev) out.push({tag:'Cartão', target:'cartoes',
      t:`Fatura subiu ${pct(cur-prev,prev)}%`,
      d:`A fatura deste mês (${BRL(cur)}) está maior que a do mês anterior (${BRL(prev)}). Vale conferir o que puxou.`,
      cta:'Ver cartões'}); }
  return out.slice(0,4);
}
function reflexaoCard(m){
  const c=document.createElement('div'); c.className='card reflex'; c.style.marginTop='16px';
  const ins=reflexoes(m);
  const body = ins.length ? ins.map((r,i)=>`
    <div class="rfx">
      <div class="rfx-tag">${r.tag}</div>
      <div class="rfx-t">${r.t}</div>
      <div class="rfx-d">${r.d}</div>
      <button class="btn btn-ghost btn-sm rfx-cta" data-i="${i}" data-target="${r.target}">${r.cta}</button>
    </div>`).join('') : `<div class="empty">Adicione entradas e gastos para a IA refletir com você.</div>`;
  c.innerHTML=`<h3><span>✦ Reflexão · IA VIZIO</span><span class="sub">pensar antes de gastar</span></h3>
    <div class="rfx-grid">${body}</div>
    <div class="budmeta" style="margin-top:10px">A IA reflete a partir dos seus próprios dados — curto, médio e longo prazo. Ajuste o valor da sua hora em Cadastros (⚙️).</div>`;
  /* Antes isto só mostrava "veja o card acima" — um beco sem saída.
     Agora o CTA leva ao card certo, rola até ele e destaca. */
  c.querySelectorAll('.rfx-cta').forEach(b=>b.onclick=()=>{
    const alvo=b.dataset.target;
    if(alvo==='base'){ view='base'; render(); return; }
    if(alvo==='invest'){ vmIrPara('#cardInvest','#v-val'); return; }
    if(alvo==='orcamento'){ vmIrPara('#cardOrcamento'); return; }
    if(alvo==='cartoes'){ vmIrPara('#cardFatura'); return; }
  });
  return c;
}
/* Leva o usuário até o card, destaca e (se houver) foca o campo. */
function vmIrPara(sel, foco){
  const el=document.querySelector(sel); if(!el) return;
  el.scrollIntoView({behavior:'smooth', block:'center'});
  el.classList.add('vm-destaque');
  setTimeout(()=>el.classList.remove('vm-destaque'), 2000);
  if(foco){ const f=el.querySelector(foco); if(f) setTimeout(()=>f.focus(), 450); }
}

/* ---------- GATING (Free x Pro) ----------
   Free = mês atual + o PRÓXIMO. Não é generosidade: a mágica do produto
   (parcela que se espalha, fatura por competência) só existe ENTRE meses.
   Travar tudo fazia a pessoa sair antes de sentir o valor — e "grátis
   limitado demais" é a reclamação nº1 contra o líder de mercado.
   O Pro vende o ano completo (Jan–Dez), IA, relatórios e cartões ilimitados. */
const isPro = () => S.plan==='pro';
const freeMonths = () => [S.current, Math.min(11, S.current+1)];
function monthLocked(m){ return !isPro() && !freeMonths().includes(m); }
function cardsLimited(){ return !isPro(); }                       // Free: até 2 cartões

/* ============================================================
   RENDER
   ============================================================ */
let activeMonth = S.current;
let view = 'month';    // month(=Início) | cartoes | orcamento | invest | year | base | conta

/* As abas de módulo MORRERAM aqui.
   Elas eram uma segunda camada de menu logo abaixo da barra inferior — e é
   exatamente isso que dá "cara de sistema": o usuário navegando a navegação.
   Cada módulo virou um item da barra de baixo. Uma camada só, como no
   Instagram e no WhatsApp. `modulo` fica só para não quebrar o tour antigo. */
let modulo = 'resumo';
/* Navegação principal: no celular vira barra inferior, no desktop menu lateral.
   Mesma fonte de verdade para os dois — um lugar só define o menu. */
/* Ícones de traço, não emoji. Emoji na navegação parece brinquedo e muda de
   desenho em cada aparelho — o Instagram não tem um único emoji na barra. */
const IC = {
  home:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5"/></svg>',
  card:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="5" width="19" height="14" rx="2.5"/><path d="M2.5 10h19"/></svg>',
  target: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1"/></svg>',
  divida: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="M17 7.5C17 5.6 14.8 4.5 12 4.5S7 5.6 7 7.5s2.2 2.6 5 3.2 5 1.5 5 3.4-2.2 3.4-5 3.4-5-1.1-5-3"/></svg>',
  seed:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21v-8"/><path d="M12 13C12 8 8 5 4 5c0 5 4 8 8 8Z"/><path d="M12 13c0-4 3-7 7-7 0 4-3 7-7 7Z"/></svg>',
  chart:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10"/><path d="M10 20V4"/><path d="M16 20v-7"/><path d="M22 20H2"/></svg>'
};
/* Uma camada de navegação, 5 itens — o mesmo número do Instagram.
   Ajustes saiu da barra: é configuração, não destino do dia a dia. Vive no ⚙️. */
/* A barra segue a tese do documento: quanto eu GANHO e GASTO (Início),
   quanto eu DEVO (Dívidas), e para onde estou indo (Guardar).
   Limites de gasto saíram da barra: são configuração, e quando estouram o app
   te avisa pelo badge e pela reflexão — você não precisa ir até lá conferir.
   Essa é a lógica do WhatsApp: a informação vem até você. */
const NAV = [
  { id:'mes',     nome:'Início',  ic:IC.home,   on:()=>view==='month'   },
  { id:'cartoes', nome:'Cartões', ic:IC.card,   on:()=>view==='cartoes' },
  { id:'dividas', nome:'Dívidas', ic:IC.divida, on:()=>view==='dividas' },
  { id:'invest',  nome:'Guardar', ic:IC.seed,   on:()=>view==='invest'  },
  { id:'ano',     nome:'Ano',     ic:IC.chart,  on:()=>view==='year'    }
];
const NAV_VIEW = { mes:'month', cartoes:'cartoes', dividas:'dividas', orcamento:'orcamento',
                   invest:'invest', ano:'year', base:'base' };
function irPara(id){
  view = NAV_VIEW[id] || 'month';
  window.scrollTo({top:0,behavior:'smooth'});
  render();
}

function render(){
  renderNav();
  renderStrip();
  /* A faixa de meses só faz sentido dentro do Mês. Nas outras visões some. */
  document.getElementById('monthStrip').classList.toggle('hide', view!=='month');
  document.getElementById('planChip').className = 'plan-chip '+(isPro()?'plan-pro':'plan-free');
  document.getElementById('planChip').textContent = isPro()?'Pro':'Free';
  document.getElementById('viewMonth').classList.toggle('hide', view!=='month');
  document.getElementById('viewYear').classList.toggle('hide', view!=='year');
  document.getElementById('viewInvest').classList.toggle('hide', view!=='invest');
  document.getElementById('viewBase').classList.toggle('hide', view!=='base');
  document.getElementById('viewConta').classList.toggle('hide', view!=='conta');
  document.getElementById('viewCartoes').classList.toggle('hide', view!=='cartoes');
  document.getElementById('viewOrcamento').classList.toggle('hide', view!=='orcamento');
  document.getElementById('viewDividas').classList.toggle('hide', view!=='dividas');
  /* O FAB só aparece onde lançar faz sentido. Botão que não serve à tela em
     que está é ruído — e o usuário aprende a ignorá-lo. */
  document.getElementById('fab').classList.toggle('hide', !['month','invest'].includes(view));
  if(view==='month')     renderMonth();
  if(view==='year')      renderYear();
  if(view==='invest')    renderInvest();
  if(view==='base')      renderBase();
  if(view==='cartoes')   renderCartoes();
  if(view==='orcamento') renderOrcamento();
  if(view==='dividas')   renderDividas();
  /* A conta mora no auth.js, que carrega DEPOIS deste script — o guard evita
     que o primeiro render() morra caso a view já venha como 'conta'. */
  if(view==='conta' && window.renderConta) window.renderConta();
  vmLigarMascaras();   /* os campos nascem a cada render — a máscara vem junto */
  save();
}

/* Uma função monta as DUAS navegações (barra inferior + lateral) a partir do
   mesmo NAV. Se um dia um item mudar, muda nos dois — sem menu órfão. */
function renderNav(){
  const html = NAV.map(n=>`<button class="nav-i${n.on()?' on':''}" data-nav="${n.id}">
      <span class="nav-ic">${n.ic}${vmBadge(n.id,activeMonth)}</span>
      <span class="nav-nm">${n.nome}</span></button>`).join('');
  const bn=document.getElementById('bottomNav'), sd=document.getElementById('sideNav');
  bn.innerHTML=html; sd.innerHTML=html;
  [...bn.children, ...sd.children].forEach(b=>b.onclick=()=>irPara(b.dataset.nav));
}

/* ‹ Julho › — o seletor que substitui os 12 botões.
   Assumindo o erro: a faixa era carrossel; quando o Isaac pediu para acabar a
   rolagem lateral, virei grade 6x2 e enchi a tela de mês. Nenhuma das duas era
   a resposta. As setas resolvem 90% dos casos (você quer o mês vizinho);
   para os outros 10%, toca no nome e escolhe. */
function renderStrip(){
  const el=document.getElementById('monthStrip'); el.innerHTML='';
  if(view!=='month'){ return; }

  const box=document.createElement('div'); box.className='mes-sel';
  const seta=(dir,alvo)=>{
    const b=document.createElement('button');
    b.className='mes-nav'; b.type='button';
    b.innerHTML = dir<0 ? '‹' : '›';
    b.setAttribute('aria-label', dir<0?'Mês anterior':'Próximo mês');
    b.disabled = alvo<0 || alvo>11;
    b.onclick=()=>{ if(monthLocked(alvo)) return paywall('Desbloqueie o ano inteiro');
      activeMonth=alvo; render(); };
    return b;
  };
  box.appendChild(seta(-1, activeMonth-1));

  const nome=document.createElement('button');
  nome.className='mes-nome'; nome.type='button';
  nome.innerHTML = `${MONTHS[activeMonth]} <span class="lk">▾</span>`;
  nome.onclick = abrirMeses;
  box.appendChild(nome);

  box.appendChild(seta(1, activeMonth+1));
  el.appendChild(box);
}

/* Os 12 meses continuam a um toque — só não moram mais na tela. */
function abrirMeses(){
  const r=document.getElementById('overlayRoot');
  r.innerHTML=`<div class="overlay"><div class="sheet">
    <h2 style="margin-bottom:14px">Ir para o mês</h2>
    <div class="mes-lista" id="mesLista"></div>
    <button class="linklike" id="mes-fecha">Fechar</button>
  </div></div>`;
  const lista=document.getElementById('mesLista');
  MONTHS.forEach((nm,m)=>{
    const b=document.createElement('button');
    const bloq=monthLocked(m);
    b.className='mes-op'+(m===activeMonth?' on':'');
    b.textContent = MABBR[m] + (bloq?' 🔒':'');
    b.disabled = false;
    b.onclick=()=>{ if(bloq){ r.innerHTML=''; return paywall('Desbloqueie o ano inteiro'); }
      activeMonth=m; view='month'; r.innerHTML=''; render(); };
    lista.appendChild(b);
  });
  document.getElementById('mes-fecha').onclick=()=> r.innerHTML='';
}

/* ---------- FAB — a folha de novo lançamento ----------
   Antes, para lançar você caçava o formulário certo dentro do card certo
   dentro do módulo certo. Agora: toca no +, escolhe o quê, digita, pronto.
   Os formulários antigos continuam existindo nas abas — quem já conhece o
   caminho não perde nada; quem é novo ganha um só. */
function abrirNovo(tipo){
  const m=activeMonth, r=document.getElementById('overlayRoot');

  if(!tipo){
    r.innerHTML=`<div class="overlay"><div class="sheet">
      <h2 style="margin-bottom:4px">O que aconteceu?</h2>
      <p class="budmeta" style="margin-bottom:16px">${MONTHS[m]} de ${S.year}</p>
      <div class="novo-ops">
        <button class="novo-op" data-t="out"><span class="novo-ic menos">↑</span>
          <span><b>Um gasto</b><i>paguei alguma coisa</i></span></button>
        <button class="novo-op" data-t="in"><span class="novo-ic mais">↓</span>
          <span><b>Uma entrada</b><i>recebi dinheiro</i></span></button>
        <button class="novo-op" data-t="ap"><span class="novo-ic guarda">◆</span>
          <span><b>Guardei</b><i>investi ou poupei</i></span></button>
        <button class="novo-op" data-t="parc"><span class="novo-ic menos">▣</span>
          <span><b>Compra parcelada</b><i>espalha sozinha pelos meses</i></span></button>
      </div>
      <button class="linklike" id="novo-fecha">Cancelar</button>
    </div></div>`;
    r.querySelectorAll('.novo-op').forEach(b=> b.onclick=()=> abrirNovo(b.dataset.t));
    document.getElementById('novo-fecha').onclick=()=> r.innerHTML='';
    return;
  }

  const hoje = vmDateBR(new Date().toISOString().slice(0,10));
  const T = {
    out:  { tit:'Novo gasto',      lb:'Descrição', ph:'Ex.: Mercado' },
    in:   { tit:'Nova entrada',    lb:'Descrição', ph:'Ex.: Salário' },
    ap:   { tit:'Guardar dinheiro',lb:'Onde',      ph:'Ex.: Caixinha Nu' },
    parc: { tit:'Compra parcelada',lb:'Descrição', ph:'Ex.: Celular' }
  }[tipo];

  r.innerHTML=`<div class="overlay"><div class="sheet">
    <h2 style="margin-bottom:14px">${T.tit}</h2>
    <div class="vm-err" id="nv-err"></div>
    <div class="vm-field"><label for="nv-desc">${T.lb}</label>
      <input id="nv-desc" placeholder="${T.ph}"></div>
    <div class="vm-field"><label for="nv-val">${tipo==='parc'?'Valor da parcela':'Valor'}</label>
      <input id="nv-val" class="money num" inputmode="decimal" placeholder="0,00"></div>
    ${tipo==='out'||tipo==='parc' ? `
      <div class="vm-field"><label for="nv-cat">Categoria</label>
        <select id="nv-cat">${S.categories.map(x=>`<option>${esc(x)}</option>`).join('')}</select></div>` : ``}
    ${tipo==='out' ? `
      <div class="vm-field"><label for="nv-pay">Como pagou</label>
        <select id="nv-pay">${allPayments().map(x=>`<option>${esc(x)}</option>`).join('')}</select></div>` : ``}
    ${tipo==='parc' ? `
      <div class="vm-field"><label for="nv-card">Cartão</label>
        <select id="nv-card">${S.cards.map(x=>`<option>${esc(x.nome)}</option>`).join('')}</select></div>
      <div class="vm-field"><label for="nv-n">Quantas parcelas</label>
        <input id="nv-n" type="number" inputmode="numeric" min="1" max="48" placeholder="10"></div>` : ``}
    ${tipo==='ap' ? `
      <div class="vm-field"><label for="nv-tipo">Tipo</label>
        <select id="nv-tipo"><option value="aporte">Guardar (aporte)</option><option value="resgate">Resgatar (tirar)</option></select></div>` : ``}
    <div class="vm-field"><label for="nv-data">Data</label>
      ${vmCampoData('nv-data','')}</div>
    <div class="budmeta" id="nv-hint" style="margin:-4px 0 12px"></div>
    <button class="btn" id="nv-ok" style="width:100%">Lançar</button>
    <button class="linklike" id="nv-nao">Cancelar</button>
  </div></div>`;

  document.getElementById('nv-data').value = hoje;
  vmLigarMascaras(r);
  const err = t => { const e=document.getElementById('nv-err'); e.textContent=t; e.style.display=t?'block':'none'; };
  document.getElementById('nv-nao').onclick=()=> r.innerHTML='';

  /* Parcelada: mostra ao vivo em que mês a 1ª parcela cai — a regra da melhor
     data só ensina se aparecer na hora da decisão. */
  if(tipo==='parc'){
    const prever=()=>{
      const d=vmDateISO(document.getElementById('nv-data')), card=document.getElementById('nv-card').value;
      const h=document.getElementById('nv-hint');
      if(!d){ h.textContent=''; return; }
      const cd=getCard(card), mf=Math.min(11, mesDaFatura(d,card));
      const dia=new Date(d+'T12:00:00').getDate(), depois=(cd?.melhor||1)>1 && dia>=(cd?.melhor||1);
      h.innerHTML = `1ª parcela em <b>${MONTHS[mf]}</b>. ` +
        (depois ? `Você comprou a partir do dia ${cd.melhor} (melhor data) — ganhou um ciclo. ✔`
                : `Comprou antes do dia ${cd?.melhor||1} — entra na fatura que fecha agora.`);
    };
    document.getElementById('nv-data').addEventListener('input',prever);
    document.getElementById('nv-card').addEventListener('change',prever);
    prever();
  }

  document.getElementById('nv-ok').onclick=()=>{
    const desc=document.getElementById('nv-desc').value.trim();
    const val =vmMoneyVal(document.getElementById('nv-val'));
    const data=vmDateISO(document.getElementById('nv-data')) || today(m);
    if(!desc) return err('Diga o que foi.');
    if(!(val>0)) return err('Informe um valor maior que zero.');

    if(tipo==='in')  month(m).incomes.push({date:data,desc,value:val});
    if(tipo==='out') month(m).expenses.push({date:data,desc,
      cat:document.getElementById('nv-cat').value, pay:document.getElementById('nv-pay').value, value:val});
    if(tipo==='ap')  month(m).investments.push({date:data,place:desc,value:val,
      tipo:document.getElementById('nv-tipo').value});
    if(tipo==='parc'){
      const n=parseInt(document.getElementById('nv-n').value);
      if(!(n>0)) return err('Quantas parcelas?');
      const card=document.getElementById('nv-card').value;
      const start=Math.min(11, mesDaFatura(data,card));
      S.purchases.push({id:uid(),desc,cat:document.getElementById('nv-cat').value,
        card,value:val,parcelas:n,start,data});
    }
    r.innerHTML=''; view='month'; render();
    toast(tipo==='parc'?'Parcelas espalhadas ✨':'Lançado');
  };
}

/* ---------- INÍCIO — um número e um feed ----------
   Isto era um painel: 4 KPIs + 12 meses + abas + panorama, tudo antes da
   pessoa lançar o primeiro real. Painel serve a quem já entende; afasta quem
   a gente quer pegar a R$ 9,90.
   Agora a home responde UMA pergunta ("posso gastar?") e mostra o que
   aconteceu — igual à lista de conversas do WhatsApp. O resto não sumiu:
   saiu da frente e mora nas abas de baixo. */
function renderMonth(){
  const m=activeMonth;
  const sf=saldoFinal(m);
  const host=document.getElementById('viewMonth');
  host.innerHTML='';

  /* HERÓI: a sobra do mês. É o único número que só o VIZIO Money sabe —
     o extrato do banco não desconta a fatura nem o que você guardou. */
  const her=document.createElement('div'); her.className='heroi';
  her.innerHTML=`
    <div class="heroi-lb">${sf>=0?'Sobra este mês':'Falta este mês'}</div>
    <div class="heroi-n${sf<0?' neg':''}">${BRL(Math.abs(sf))}</div>
    <div class="heroi-ctx">${heroiContexto(m)}</div>`;
  host.appendChild(her);

  /* Uma reflexão só, e apenas quando tem o que dizer. Antes eram quatro
     cards empilhados: conselho demais vira barulho e ninguém lê nenhum. */
  const rf = reflexoes(m)[0];
  if(rf) host.appendChild(reflexaoUnica(rf));

  /* O FEED */
  host.appendChild(feedCard(m));
}

/* A linha que explica o número — sem ela o herói é só um número bonito. */
function heroiContexto(m){
  const mm=month(m), inc=incomesTotal(m), fat=faturasTotal(m), inv=investTotal(m);
  const partes=[];
  if(inc>0) partes.push(`entrou <b>${BRL(inc)}</b>`);
  if(fat>0) partes.push(`a fatura de <b>${BRL(fat)}</b> já saiu`);
  if(inv>0) partes.push(`você guardou <b>${BRL(inv)}</b>`);
  if(!partes.length) return 'Toque no <b>+</b> e lance sua primeira entrada. O resto o app calcula.';
  const uso = usoCartaoTotal(m);
  const extra = uso>0 ? ` Ainda tem <b>${BRL(uso)}</b> no crédito virando a fatura do mês que vem.` : '';
  return partes.join(' · ') + '.' + extra;
}

/* FEED — tudo do mês em uma linha do tempo só, mais recente primeiro.
   Antes: três tabelas separadas (entradas, gastos, investimentos), cada uma
   com cabeçalho e borda. A pessoa não pensa em três tabelas; ela pensa
   "o que aconteceu com meu dinheiro". */
function feedItens(m){
  const mm=month(m), it=[];
  mm.incomes.forEach((x,i)=> it.push({t:'in', d:x.date, nome:x.desc, sub:'entrada', v:+x.value, i}));
  mm.expenses.forEach((x,i)=> it.push({t:'out', d:x.date, nome:x.desc,
    sub:`${x.cat} · ${x.pay}${isCredit(x.pay)?' (crédito)':''}`, v:+x.value, i}));
  mm.investments.forEach((x,i)=> it.push({t:x.tipo==='resgate'?'resg':'ap', d:x.date, nome:x.place,
    sub:x.tipo==='resgate'?'resgatado':'guardado', v:+x.value, i}));
  installmentItems(m).forEach(p=> it.push({t:'parc', d:p.data||today(m), nome:p.desc,
    sub:`${p.n}/${p.parcelas} · ${p.card}`, v:+p.value, fixo:true}));
  return it.sort((a,b)=> String(b.d||'').localeCompare(String(a.d||'')));
}
const FEED_IC = { in:'↓', out:'↑', ap:'◆', resg:'◇', parc:'▣' };
function feedCard(m){
  const c=document.createElement('div'); c.className='card';
  const itens=feedItens(m);

  if(!itens.length){
    c.innerHTML=`<div class="feed-vazio">Nada lançado em ${MONTHS[m]} ainda.<br>
      Toque no <b>+</b> para começar.</div>`;
    return c;
  }

  let html='', diaAtual='';
  itens.forEach((x,k)=>{
    const dia = fmtDate(x.d);
    if(dia!==diaAtual){ diaAtual=dia; html+=`<div class="feed-dia">${dia}</div>`; }
    const cls = x.t==='in'?'mais' : (x.t==='ap'||x.t==='resg')?'guarda' : 'menos';
    const sinal = x.t==='in'?'+' : (x.t==='ap'?'' : x.t==='resg'?'+' : '−');
    /* <button> e não <div>: div com onclick não recebe foco, não responde a
       Enter/Espaço e o leitor de tela não anuncia como acionável. */
    const acionavel = x.t!=='parc';
    html+=`<${acionavel?'button type="button"':'div'} class="feed-i" data-t="${x.t}" data-i="${x.i??''}"
      ${acionavel?`aria-label="Apagar ${esc(x.nome||'lançamento')}, ${BRL(x.v)}"`:''}>
      <span class="feed-ic" aria-hidden="true">${FEED_IC[x.t]}</span>
      <span class="feed-tx"><b>${esc(x.nome||'—')}</b><span>${esc(x.sub)}</span></span>
      <span class="feed-vl ${cls}">${sinal}${BRL(x.v).replace('R$ ','')}</span>
    </${acionavel?'button':'div'}>`;
  });
  c.innerHTML = `<h3>${MONTHS[m]} <span class="sub">${itens.length} lançamento${itens.length>1?'s':''}</span></h3>${html}`;

  /* Apagar direto + DESFAZER, em vez de confirm().
     Parcela não se apaga por aqui: ela é a sombra de uma compra, e apagar a
     sombra sem o objeto confunde — some e volta no próximo render. */
  c.querySelectorAll('.feed-i').forEach(el=>{
    const t=el.dataset.t, i=+el.dataset.i;
    if(t==='parc'){ el.style.cursor='default'; return; }
    el.onclick=()=>{
      const arr = t==='in' ? month(m).incomes : t==='out' ? month(m).expenses : month(m).investments;
      const nome = el.querySelector('b').textContent;
      const copia = structuredClone(arr[i]);          /* guarda antes de sumir */
      arr.splice(i,1); render();
      toastDesfazer(`"${nome}" apagado`, ()=> arr.splice(i,0,copia));
    };
  });
  return c;
}

/* Uma reflexão, discreta. Sem caixa: só um fio dourado à esquerda. */
function reflexaoUnica(rf){
  const c=document.createElement('div'); c.className='rfx-solo';
  c.innerHTML=`<div class="rfx-tag">${esc(rf.tag)}</div>
    <div class="rfx-t">${esc(rf.t)}</div>
    <div class="rfx-d">${rf.d}</div>
    <button class="rfx-cta" type="button">${esc(rf.cta)} →</button>`;
  c.querySelector('.rfx-cta').onclick=()=>{
    const alvo=rf.target;
    if(alvo==='base'){ view='base'; }
    else if(alvo==='invest'){ view='invest'; }
    else if(alvo==='orcamento'){ view='orcamento'; }
    else if(alvo==='cartoes'){ view='cartoes'; }

  return c;
}

   Vive dentro de Guardar porque é a mesma intenção: por que você está
   juntando. Teto de gasto SEGURA; meta PUXA. Não podem morar no mesmo lugar
   sem virar a mesma coisa na cabeça de quem usa. */
function metasCard(){

    gs.map(g=>{
      const k=metaCalc(g);
      return `<button type="button" class="mt-i" data-id="${g.id}"

        <div class="mt-top">
          <span class="mt-nome">${esc(g.nome)}${k.pronta?' <i class="mt-ok">conquistada</i>':''}</span>
          <span class="mt-pct">${k.pct}%</span>
        </div>
        <div class="mt-barra"><i style="width:${k.pct}%"></i></div>
        <div class="mt-pe">
          <span>${BRL(k.feito)} de ${BRL(k.alvo)}</span>
          <span>${k.pronta ? '🎉 chegou lá'
            : k.atrasada ? `<span style="color:var(--neg)">prazo venceu · faltam ${BRL(k.falta)}</span>`
            : k.porMes!=null ? `<b>${BRL(k.porMes)}/mês</b> por ${k.meses} ${k.meses===1?'mês':'meses'}`
            : `faltam ${BRL(k.falta)}`}</span>
        </div>
      </button>`;
    }).join('') +
    `<button class="btn btn-ghost" id="mt-add" style="width:100%;margin-top:16px">Nova meta</button>`;
  c.querySelector('#mt-add').onclick=()=>abrirMeta();
  c.querySelectorAll('.mt-i').forEach(el=> el.onclick=()=>{
    const g=S.metas.find(x=>x.id===el.dataset.id); if(g) abrirMeta(g);
  });
  return c;
}

function abrirMeta(g){
  const r=document.getElementById('overlayRoot'), ed=!!g;
  const hoje=new Date();
  const prazoPad = `${hoje.getFullYear()}-12`;
  r.innerHTML=`<div class="overlay"><div class="sheet">
    <h2 style="margin-bottom:14px">${ed?'Editar meta':'Nova meta'}</h2>
    <div class="vm-err" id="mt-err"></div>
    <div class="vm-field"><label for="mt-nome">Para quê</label>
      <input id="mt-nome" placeholder="Ex.: Natal, reserva, viagem" value="${ed?esc(g.nome):''}"></div>
    <div class="vm-field"><label for="mt-alvo">Quanto você precisa</label>
      <input id="mt-alvo" class="money num" inputmode="decimal" placeholder="0,00"
        value="${ed?vmMoneyFmt(g.alvo):''}"></div>
    <div class="vm-field"><label for="mt-guard">Quanto já tem</label>
      <input id="mt-guard" class="money num" inputmode="decimal" placeholder="0,00"
        value="${ed?vmMoneyFmt(g.guardado):''}"></div>
    <div class="vm-field"><label for="mt-prazo">Até quando</label>
      <input id="mt-prazo" type="month" value="${ed?(g.prazo||prazoPad):prazoPad}"></div>
    <div class="budmeta" id="mt-calc" style="margin:-4px 0 12px"></div>
    <button class="btn" id="mt-ok" style="width:100%">${ed?'Salvar':'Criar meta'}</button>
    ${ed?`<button class="btn-perigo" id="mt-del" style="width:100%;margin-top:8px">Apagar esta meta</button>`:''}
    <button class="linklike" id="mt-nao">Cancelar</button>
  </div></div>`;
  vmLigarMascaras(r);
  const err=t=>{const e=document.getElementById('mt-err');e.textContent=t;e.style.display=t?'block':'none';};

  /* Mostra o "quanto por mês" ENQUANTO digita: é o número que faz a meta
     parecer possível — ou obviamente impossível, o que também é informação. */
  const prever=()=>{
    const k=metaCalc({ alvo:vmMoneyVal(document.getElementById('mt-alvo'))||0,
      guardado:vmMoneyVal(document.getElementById('mt-guard'))||0,
      prazo:document.getElementById('mt-prazo').value });
    const el=document.getElementById('mt-calc');
    if(!k.alvo){ el.textContent=''; return; }
    if(k.pronta){ el.innerHTML='🎉 Você já tem o valor todo.'; return; }
    el.innerHTML = k.meses>0
      ? `Faltam <b>${BRL(k.falta)}</b> — dá <b>${BRL(k.porMes)} por mês</b> em ${k.meses} ${k.meses===1?'mês':'meses'}.`
      : `Faltam <b>${BRL(k.falta)}</b> e o prazo é agora.`;
  };
  ['mt-alvo','mt-guard','mt-prazo'].forEach(id=>{
    document.getElementById(id).addEventListener('input',prever);
    document.getElementById(id).addEventListener('change',prever);
  });
  prever();

  document.getElementById('mt-nao').onclick=()=> r.innerHTML='';
  document.getElementById('mt-del')?.addEventListener('click',()=>{
    const copia=structuredClone(g), pos=S.metas.findIndex(x=>x.id===g.id);
    S.metas=S.metas.filter(x=>x.id!==g.id); r.innerHTML=''; render();
    toastDesfazer(`Meta "${copia.nome}" apagada`, ()=> S.metas.splice(pos,0,copia));
  });
  document.getElementById('mt-ok').onclick=()=>{
    const nome=document.getElementById('mt-nome').value.trim();
    const alvo=vmMoneyVal(document.getElementById('mt-alvo'));
    const guardado=vmMoneyVal(document.getElementById('mt-guard'))||0;
    const prazo=document.getElementById('mt-prazo').value;
    if(!nome) return err('Para que é essa meta?');
    if(!(alvo>0)) return err('Quanto você precisa juntar?');
    if(guardado>alvo) return err('O que você já tem não pode ser maior que a meta.');
    if(ed){ Object.assign(g,{nome,alvo,guardado,prazo}); }
    else { S.metas.push({id:uid(),nome,alvo,guardado,prazo,criada:new Date().toISOString()}); }
    r.innerHTML=''; view='invest'; render();
    toast(ed?'Meta atualizada':'Meta criada 🎯');
  };
}

/* ---------- DÍVIDAS — "como eu saio disso" ----------
   O documento chama de "opção principal". É a única tela do app que não fala
   de organizar: fala de sair. */
let dvEstrategia = 'avalanche';   // avalanche | bola
let dvExtra = 0;

function renderDividas(){
  const host=document.getElementById('viewDividas');
  host.innerHTML='';
  const lista=(S.dividas||[]).filter(d=>+d.saldo>0);

  if(!lista.length){
    const v=document.createElement('div'); v.className='card';
    v.innerHTML=`<div class="feed-vazio">
      <div style="font-size:34px;margin-bottom:10px">🎉</div>
      <b style="color:var(--ink);font-size:16px;display:block;margin-bottom:6px">Você não deve nada</b>
