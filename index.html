<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#06080F">
<title>VIZIO Money — VIZIO FINANCE</title>
<link rel="icon" href="brand/logo.svg">
<link rel="apple-touch-icon" href="brand/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="brand.css?v=0.3">
<style>
*{margin:0;padding:0;box-sizing:border-box}
/* A luz da página vem do MODO AURA v3 (aura.js) — não de gradientes locais. */
body{font-family:var(--font);color:var(--s600);background:var(--bg);-webkit-tap-highlight-color:transparent}
h1,h2,h3,.disp{font-family:var(--font-display);color:var(--ink);letter-spacing:-.02em;line-height:1.15}
.num{font-variant-numeric:tabular-nums lining-nums}
button{font-family:inherit;cursor:pointer}
/* 16px é obrigatório: abaixo disso o iOS dá zoom automático ao focar o campo. */
input,select{font-family:inherit;font-size:16px}
.hide{display:none!important}

/* App shell */
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;justify-content:space-between;
  padding:12px 18px;background:rgba(6,8,15,.72);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topbar .right{display:flex;align-items:center;gap:10px}
.plan-chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--r-full)}
.plan-free{color:var(--s600);background:var(--s100);border:1px solid var(--line)}
.plan-pro{color:var(--gold);background:var(--gold-soft);border:1px solid rgba(201,169,104,.4)}
.plan-master{color:#06080F;background:var(--grad-gold);border:1px solid transparent;font-weight:800;letter-spacing:.06em}

/* Faixa de pagamento pendente (carência) — padrão Vizio Finance */
.vm-banner{position:sticky;top:58px;z-index:29;display:flex;align-items:center;justify-content:center;gap:12px;
  padding:10px 18px;font-size:13px;font-weight:600;color:#F5D89A;
  background:rgba(201,169,104,.12);border-bottom:1px solid rgba(201,169,104,.35)}
@media(max-width:640px){.vm-banner{flex-direction:column;gap:8px;text-align:center}}

/* Tela de acesso */
.vm-tabs{display:flex;gap:6px;background:var(--coal);border:1px solid var(--line);border-radius:12px;padding:4px;margin:14px 0}
.vm-tab{flex:1;border:none;background:transparent;color:var(--s500);font-family:inherit;font-weight:700;font-size:13px;
  padding:10px;border-radius:9px;cursor:pointer}
.vm-tab.on{background:var(--grad-brand);color:#fff}
.vm-field{text-align:left;margin-bottom:11px}
.vm-field label{display:block;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--s500);margin-bottom:5px}
.vm-field input{width:100%;padding:13px 14px;border:1px solid var(--line2);border-radius:10px;
  background:var(--coal);color:var(--ink);font-size:16px}
.vm-field input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(28,100,240,.18)}
.vm-err{display:none;background:var(--neg-bg);border:1px solid rgba(240,97,109,.4);color:#F0616D;
  border-radius:10px;padding:9px 12px;font-size:12.5px;margin-bottom:10px;text-align:left}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--s600);font-size:16px;display:flex;align-items:center;justify-content:center}

.wrap{max-width:1080px;margin:0 auto;padding:18px 18px 120px}

/* Month strip */
.monthstrip{display:flex;gap:7px;overflow-x:auto;padding:14px 2px 6px;scrollbar-width:none}
.monthstrip::-webkit-scrollbar{display:none}
.mbtn{flex:0 0 auto;padding:8px 14px;border-radius:var(--r-full);border:1px solid var(--line);background:var(--surface);
  color:var(--s600);font-weight:600;font-size:13px;position:relative}
.mbtn.active{background:var(--grad-brand);color:#fff;border-color:transparent;box-shadow:0 4px 18px rgba(28,100,240,.45);font-weight:700}
.mbtn.locked{opacity:.5}
.mbtn .lk{font-size:9px;margin-left:4px}

/* Cards & grid */
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:820px){.g2,.g3,.g4{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--sh-sm)}
.card h3{font-size:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
.card h3 .sub{font-family:var(--font);font-weight:600;font-size:12px;color:var(--s500)}

/* KPI */
.kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:820px){.kpi{grid-template-columns:1fr 1fr}}
.kpi .box{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:14px 16px;box-shadow:var(--sh-sm)}
.kpi .lab{font-size:11px;font-weight:600;color:var(--s500);display:flex;align-items:center;gap:6px}
.kpi .val{font-family:var(--font-display);font-weight:800;font-size:24px;margin-top:6px;letter-spacing:-.02em}
.pos{color:var(--pos)} .neg{color:var(--neg)} .warn{color:var(--warn)} .brandc{color:var(--brand)}
.dot{width:8px;height:8px;border-radius:3px}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--s500);font-weight:700;padding:6px 8px;border-bottom:1px solid var(--line)}
td{padding:8px;border-bottom:1px solid var(--line);color:var(--s700)}
tr:last-child td{border-bottom:none}
.rowdel{color:var(--s400);border:none;background:none;font-size:15px;padding:2px 6px;border-radius:6px}
.rowdel:hover{color:var(--neg);background:var(--neg-bg)}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:var(--r-full);background:var(--s100);color:var(--s600)}
.tag.credit{background:var(--brand-soft);color:var(--brand-deep)}
.empty{color:var(--s400);font-size:13px;padding:14px 4px;text-align:center}

/* Forms */
.addrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;align-items:center}
.addrow input,.addrow select{padding:9px 11px;border:1px solid var(--line2);border-radius:10px;background:var(--surface);color:var(--ink);min-width:0}
.addrow input[type=date]{color:var(--s600)}
.addrow .f-desc{flex:2;min-width:120px} .addrow .f-num{width:110px} .addrow .f-sel{flex:1;min-width:110px} .addrow .f-sm{width:90px}
.btn{border:none;border-radius:10px;padding:9px 15px;font-weight:700;font-size:13px;color:#fff;background:var(--grad-brand);box-shadow:var(--sh-sm)}
.btn:hover{filter:brightness(1.08)} .btn:active{transform:translateY(1px)}
.btn-ghost{background:transparent;color:var(--brand-2);border:1px solid var(--line2)}
.btn-sm{padding:6px 11px;font-size:12px}
/* Ouro = dinheiro: só para assinar/valor. Nunca para ação comum. */
.btn-money{background:var(--grad-gold);color:#06080F}

/* Budget moon list */
.budline{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line)}
.budline:last-child{border-bottom:none}
.moon{font-size:18px;line-height:1}
.budmeta{font-size:12px;color:var(--s500)}
.budcat{font-weight:600;color:var(--s700);font-size:13px}
.bar{height:6px;border-radius:4px;background:var(--s100);overflow:hidden;margin-top:5px}
.bar > i{display:block;height:100%;border-radius:4px}

/* IA de Reflexão */
.card.reflex{border-color:rgba(201,169,104,.32)}
.card.reflex h3 span:first-child{color:var(--gold)}
.rfx-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.rfx-grid{grid-template-columns:1fr}}
.rfx{background:var(--coal);border:1px solid var(--line);border-radius:13px;padding:14px 16px}
.rfx-tag{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.rfx-t{font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--warm);margin-bottom:5px;line-height:1.25}
.rfx-d{font-size:13px;color:var(--mineral);line-height:1.5}
.rfx-cta{margin-top:11px}

/* Panorama */
.pano{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px}
.pano .col{flex:0 0 auto;width:64px;text-align:center}
.pano .colhead{font-size:11px;font-weight:700;color:var(--s500);margin-bottom:6px}
.pano .colbar{height:80px;display:flex;align-items:flex-end;justify-content:center}
.pano .colbar > i{width:24px;border-radius:6px 6px 0 0;background:var(--grad-brand);min-height:3px}
.pano .colval{font-size:10px;margin-top:5px;color:var(--s600)}
.pano .col.hot .colbar > i{background:linear-gradient(180deg,#E11D48,#F59E0B)}

/* Bar chart (annual) */
.chart{display:flex;gap:8px;align-items:flex-end;height:150px;padding-top:8px}
.chart .c{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.chart .c > i{width:70%;border-radius:6px 6px 0 0;min-height:2px;transition:height .3s}
.chart .c .lb{font-size:10px;color:var(--s500)}

/* Login / paywall overlay */
.overlay{position:fixed;inset:0;z-index:80;background:rgba(14,23,38,.42);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px}
.sheet{background:var(--surface);border-radius:22px;max-width:400px;width:100%;padding:28px 26px;box-shadow:var(--sh-lg);text-align:center}
.sheet h2{font-size:22px;margin-bottom:6px}
.sheet p{font-size:14px;color:var(--s500);margin-bottom:18px}
.sheet .price{font-family:var(--font-display);font-weight:800;font-size:34px;color:var(--ink);letter-spacing:-.02em}
.sheet .price small{font-size:14px;color:var(--s500);font-weight:600}
.sheet .btn{width:100%;padding:13px;font-size:15px;margin-top:8px}
.sheet .feat{text-align:left;margin:16px 0 8px;font-size:13px}
.sheet .feat div{display:flex;gap:8px;padding:5px 0;color:var(--s700)}
.sheet .feat .ck{color:var(--grow)}
.linklike{background:none;border:none;color:var(--s500);font-size:13px;margin-top:12px;text-decoration:underline}

/* toast + celebrate */
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;z-index:90;
  background:#1C2330;color:var(--warm);border:1px solid var(--line2);padding:11px 18px;border-radius:var(--r-full);font-size:13px;font-weight:600;
  box-shadow:var(--sh-lg);transition:.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.foot{max-width:1080px;margin:24px auto 0;padding:0 18px;color:var(--s400);font-size:11px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
.section-title{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--s500);margin:26px 0 10px}
@media (prefers-reduced-motion: reduce){*{transition:none!important}}

/* ==========================================================================
   REVISÃO MOBILE — o app vive no celular.
   Baseado em medição real: input 14px (zoom do iOS), botão de 28px de altura,
   ícones de 36px e ausência de safe-area.
   ========================================================================== */

/* 1. Safe area (notch / barra inferior do iPhone) */
.topbar{padding-top:calc(12px + env(safe-area-inset-top));
  padding-left:calc(18px + env(safe-area-inset-left));
  padding-right:calc(18px + env(safe-area-inset-right))}
.wrap{padding-left:calc(18px + env(safe-area-inset-left));
  padding-right:calc(18px + env(safe-area-inset-right));
  padding-bottom:calc(120px + env(safe-area-inset-bottom))}

/* 2. Alvos de toque ≥44px.
   Dupla trava de propósito: (pointer:coarse) pega o dedo em qualquer largura,
   e (max-width) pega híbridos/tablets/desktop-touch onde a detecção de ponteiro
   mente. Medição no desktop mostrou botão de 27px porque só a 1ª regra existia. */
@media (pointer:coarse), (max-width:820px){
  .btn{padding:13px 18px;font-size:14px;min-height:44px;
    display:inline-flex;align-items:center;justify-content:center}
  .btn-sm{padding:11px 14px;font-size:13px;min-height:44px}
  .icon-btn{width:44px;height:44px;font-size:18px}
  .mbtn{min-height:44px;padding:10px 16px}
  .rowdel{min-width:44px;min-height:44px;font-size:18px}
  .addrow input,.addrow select{min-height:46px}
  .linklike{min-height:44px;padding:10px}
}

/* 3. Faixa dos meses fixa logo abaixo da topbar: trocar de mês é a ação nº1 */
@media(max-width:820px){
  .monthstrip{position:sticky;top:calc(58px + env(safe-area-inset-top));z-index:30;
    background:rgba(6,8,15,.9);backdrop-filter:blur(10px);
    margin:0 -18px;padding:10px 18px;border-bottom:1px solid var(--line)}
}

/* 4. Formulários empilhados: no celular, campo lado a lado vira campo espremido */
@media(max-width:640px){
  .addrow{gap:9px}
  .addrow input,.addrow select{flex:1 1 100%;width:100%;min-width:0}
  .addrow .f-desc,.addrow .f-num,.addrow .f-sel,.addrow .f-sm{flex:1 1 100%;width:100%}
  .addrow .btn{width:100%}
  /* data + valor dividem a linha: são curtos e ficam bem em dupla */
  .addrow input[type=date]{flex:1 1 calc(50% - 5px);width:auto}
  .addrow input[type=number]{flex:1 1 calc(50% - 5px);width:auto}
}

/* 5. KPIs: número grande não pode quebrar o card */
@media(max-width:820px){
  .kpi .val{font-size:clamp(17px,5.2vw,24px);letter-spacing:-.03em}
  .kpi .box{padding:12px 13px}
  .kpi .lab{font-size:10.5px}
}

/* 6. Tabelas: apertar sem cortar */
@media(max-width:560px){
  table{font-size:12.5px}
  th,td{padding:7px 4px}
  th{font-size:9.5px;letter-spacing:.03em}
  .card{padding:14px 13px}
  .card h3{font-size:13.5px}
  .tag{font-size:10px;padding:2px 6px}
}

/* 7. Gráfico anual e panorama respiram no celular */
@media(max-width:560px){
  .chart{height:120px;gap:4px}
  .chart .c .lb{font-size:9px}
  .pano .col{width:52px}
  .rfx-t{font-size:14px}
}

/* 8. Overlays coladas no fundo da tela (mais fácil de alcançar o polegar) */
@media(max-width:560px){
  .overlay{align-items:flex-end;padding:0}
  .sheet{max-width:100%;border-radius:22px 22px 0 0;
    padding-bottom:calc(26px + env(safe-area-inset-bottom))}
}
</style>
</head>
<body>

<!-- ===== TOPBAR ===== -->
<header class="topbar">
  <a class="brand-lockup" href="#">
    <span class="brand-mark"><img src="brand/logo.svg?v=0.3" width="30" height="27" alt="VIZIO Money"></span>
    <span>
      <span class="brand-word">VIZIO <b>Money</b></span>
      <span class="brand-badge" style="display:block;margin-top:2px">VIZIO Finance</span>
    </span>
  </a>
  <div class="right">
    <span id="planChip" class="plan-chip plan-free">Free</span>
    <button class="icon-btn" id="btnBase" title="Cadastros (cartões, categorias, orçamento)">⚙️</button>
    <button class="icon-btn" id="btnMenu" title="Conta">👤</button>
  </div>
</header>

<div class="wrap">
  <!-- month strip -->
  <div class="monthstrip" id="monthStrip"></div>

  <!-- VIEW: MÊS -->
  <div id="viewMonth"></div>

  <!-- VIEW: DASHBOARD ANUAL -->
  <div id="viewYear" class="hide"></div>

  <!-- VIEW: BASE -->
  <div id="viewBase" class="hide"></div>
</div>

<div class="foot">
  <span>VIZIO Money · Jan–Dez · dados salvos neste dispositivo</span>
  <span>powered by VIZIO · um produto INPERSON</span>
</div>

<div id="overlayRoot"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   VIZIO MONEY — engine + UI  (v1, dados locais / offline)
   Preparado para futura sincronização com Supabase.
   ============================================================ */
const BRL = n => (n<0?'-':'')+'R$ '+Math.abs(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MABBR  = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
const KEY='vizio_money_v1';
const uid=()=>Math.random().toString(36).slice(2,9);

const DEFAULTS = {
  version:1, plan:'free', year:2026, current:new Date().getMonth(),
  cards:['C6','Nu','MP','C&A','RCHL'],
  categories:['Moradia','Apartamento','Assinaturas','Saúde','Alimentação','Lazer','Uber','Beleza','Roupas','Presentes','Essencial','Contas de Casa','Educação','Lanches','Imprevistos','Outros'],
  payments:['Pix','Débito'], /* + cartões (crédito) são adicionados dinamicamente */
  budgets:{Moradia:100,Apartamento:3000,Assinaturas:100,'Saúde':200,'Alimentação':600,Lazer:100,Uber:50,Beleza:100,Roupas:100,Presentes:100,Essencial:300,'Contas de Casa':250,'Educação':100,Lanches:80,Imprevistos:150,Outros:50},
  months:{}, /* m -> {opening:null, incomes:[], investments:[], expenses:[]} */
  purchases:[], /* parceladas globais: {id,cat,desc,card,value,parcelas,start} */
  hourlyWage:null /* R$/hora p/ custo de oportunidade; null = estimado da renda */
};

let S = load();
function load(){ try{const r=JSON.parse(localStorage.getItem(KEY)); if(r&&r.version) return migrate(r);}catch(e){} return structuredClone(DEFAULTS); }
function migrate(r){ for(const k in DEFAULTS) if(!(k in r)) r[k]=structuredClone(DEFAULTS[k]); return r; }
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }
function month(m){ if(!S.months[m]) S.months[m]={opening:null,incomes:[],investments:[],expenses:[]}; return S.months[m]; }
const creditMethods = () => S.cards;
const allPayments = () => [...S.payments, ...S.cards];
const isCredit = pay => S.cards.includes(pay);

/* ---------- ENGINE ---------- */
function installmentItems(m){ // parcelas ativas no mês m (a partir das compras globais)
  const out=[];
  for(const p of S.purchases){
    const n = m - p.start + 1;
    if(n>=1 && n<=p.parcelas) out.push({cat:p.cat,desc:p.desc,card:p.card,value:+p.value,n,of:p.parcelas,pid:p.id});
  }
  return out;
}
function monthExpenseItems(m){ // gastos avulsos + parcelas do mês
  const mm=month(m);
  const one = mm.expenses.map(e=>({...e, kind:'one'}));
  const ins = installmentItems(m).map(e=>({cat:e.cat,desc:e.desc+` (${e.n}/${e.of})`,pay:e.card,value:e.value,kind:'ins'}));
  return [...one, ...ins];
}
const incomesTotal = m => month(m).incomes.reduce((s,x)=>s+ +x.value,0);
const investTotal  = m => month(m).investments.reduce((s,x)=>s+ +x.value,0);
function cardSpend(card,m){ // crédito lançado no cartão no mês (avulso + parcela)
  let t=0;
  for(const e of month(m).expenses) if(e.pay===card) t+=+e.value;
  for(const e of installmentItems(m)) if(e.card===card) t+=+e.value;
  return t;
}
const faturaCard = (card,m) => m<=0?0:cardSpend(card,m-1); // competência mês anterior
const faturasTotal = m => S.cards.reduce((s,c)=>s+faturaCard(c,m),0);
function nonCreditOut(m){ let t=0; for(const e of month(m).expenses) if(!isCredit(e.pay)) t+=+e.value; return t; }
const cashOut = m => nonCreditOut(m) + faturasTotal(m); // o que sai da conta no mês
function effOpening(m){ const mm=month(m); if(mm.opening!==null&&mm.opening!=='') return +mm.opening; return m===0?0:saldoFinal(m-1); }
function saldoFinal(m){ return effOpening(m) + incomesTotal(m) - cashOut(m) - investTotal(m); }
function categoryReal(cat,m){ let t=0; for(const e of monthExpenseItems(m)) if(e.cat===cat) t+=+e.value; return t; }
function panorama(){ // 12 meses -> total parcelas + qtd
  return [...Array(12)].map((_,m)=>{ const it=installmentItems(m); return {total:it.reduce((s,x)=>s+x.value,0), count:it.length}; });
}
/* fase da lua conforme % do teto */
function moon(ratio){
  if(ratio>=1)    return {g:'●',c:'var(--moon-4)',label:'estourou'};
  if(ratio>=0.75) return {g:'◕',c:'var(--moon-3)',label:'atenção'};
  if(ratio>=0.5)  return {g:'◑',c:'var(--moon-2)',label:'metade'};
  if(ratio>=0.25) return {g:'◔',c:'var(--moon-1)',label:'tranquilo'};
  return {g:'○',c:'var(--moon-0)',label:'folga'};
}
const barColor = r => r>=1?'var(--neg)':r>=0.75?'var(--warn)':'var(--grow)';
/* Arco de Clareza — motivo-assinatura (substitui as fases da lua) */
function clarityArc(ratio){
  const f=Math.max(0,Math.min(1,ratio||0));
  const cx=23,cy=26,r=19, th=Math.PI*(1-f);
  const x=(cx+r*Math.cos(th)).toFixed(1), y=(cy-r*Math.sin(th)).toFixed(1);
  const col = ratio>=1?'var(--arc-4)':ratio>=0.75?'var(--arc-3)':'var(--arc-2)';
  const fill = f<=0 ? '' : `<path d="M4 26 A19 19 0 0 1 ${x} ${y}" fill="none" stroke="${col}" stroke-width="4" stroke-linecap="round"/>`;
  return `<svg width="42" height="27" viewBox="0 0 46 30" aria-hidden="true"><path d="M4 26 A19 19 0 0 1 42 26" fill="none" stroke="var(--arc-track)" stroke-width="4" stroke-linecap="round"/>${fill}</svg>`;
}

/* ============================================================
   IA DE REFLEXÃO — motor de regras (offline, sem backend)
   Custo de oportunidade · assinaturas · pague-se primeiro ·
   alertas · curto/médio/longo prazo. Pronto p/ plugar LLM depois.
   ============================================================ */
function estHourly(){
  if(+S.hourlyWage>0) return +S.hourlyWage;
  let tot=0,cnt=0; for(let i=0;i<12;i++){const inc=incomesTotal(i); if(inc>0){tot+=inc;cnt++;}}
  const avg = cnt? tot/cnt : 0;
  return avg>0 ? avg/176 : 20;   /* 176h úteis/mês; fallback R$20/h */
}
function fvMonthly(monthly,years,rate){ const A=monthly*12; return A*((Math.pow(1+rate,years)-1)/rate); }
const pct = (a,b)=> b>0? Math.round((a/b)*100):0;
function reflexoes(m){
  const out=[], hw=estHourly();
  const tot={}; for(const e of monthExpenseItems(m)) tot[e.cat]=(tot[e.cat]||0)+ +e.value;
  const top=Object.entries(tot).sort((a,b)=>b[1]-a[1])[0];
  if(top && top[1]>0){
    const [cat,val]=top, hrs=hw?val/hw:0, fv=fvMonthly(val,10,0.10);
    out.push({tag:'Custo de oportunidade', target:'base',
      t:`${cat}: ${BRL(val)} neste mês`,
      d:`Equivale a <b>${hrs.toFixed(1)} horas</b> do seu trabalho. Mantido todo mês e investido a ~10%/ano, em 10 anos viraria <b>${BRL(fv)}</b>.`,
      cta:`Definir um teto para ${cat}`});
  }
  const assin=categoryReal('Assinaturas',m);
  if(assin>0) out.push({tag:'Assinaturas', target:'base',
    t:`${BRL(assin)}/mês em assinaturas`,
    d:`São <b>${BRL(assin*12)} por ano</b>. Cortar o que você não usou nas últimas 2 semanas já monta parte da sua reserva.`,
    cta:'Revisar assinaturas'});
  const estouradas=S.categories.filter(c=>{const t=+(S.budgets[c]||0);return t>0 && categoryReal(c,m)/t>=1;});
  if(estouradas.length) out.push({tag:'Alerta', target:'stay',
    t:`${estouradas.length} categoria(s) no limite`,
    d:`<b>${estouradas.slice(0,3).join(', ')}</b> estourou o teto — o Arco de Clareza está cheio. Hora de segurar até o fim do mês.`,
    cta:'Ver orçamento acima'});
  const inv=investTotal(m), inc=incomesTotal(m);
  if(inc>0 && inv<inc*0.1){ const sug=inc*0.1;
    out.push({tag:'Pague-se primeiro', target:'stay',
      t:`Você guardou ${pct(inv,inc)}% da renda`,
      d:`A meta saudável começa em <b>10%</b>. Guardar <b>${BRL(sug)}</b>/mês, investido, vira <b>${BRL(fvMonthly(sug,10,0.10))}</b> em 10 anos.`,
      cta:'Registrar um investimento'}); }
  if(m>0){ const cur=faturasTotal(m), prev=faturasTotal(m-1);
    if(prev>0 && cur>prev) out.push({tag:'Cartão', target:'stay',
      t:`Fatura subiu ${pct(cur-prev,prev)}%`,
      d:`A fatura deste mês (${BRL(cur)}) está maior que a do mês anterior (${BRL(prev)}). Vale conferir o que puxou.`,
      cta:'Ver cartões acima'}); }
  return out.slice(0,4);
}
function reflexaoCard(m){
  const c=document.createElement('div'); c.className='card reflex'; c.style.marginTop='16px';
  const ins=reflexoes(m);
  const body = ins.length ? ins.map((r,i)=>`
    <div class="rfx">
      <div class="rfx-tag">${r.tag}</div>
      <div class="rfx-t">${r.t}</div>
      <div class="rfx-d">${r.d}</div>
      <button class="btn btn-ghost btn-sm rfx-cta" data-i="${i}" data-target="${r.target}">${r.cta}</button>
    </div>`).join('') : `<div class="empty">Adicione entradas e gastos para a IA refletir com você.</div>`;
  c.innerHTML=`<h3><span>✦ Reflexão · IA VIZIO</span><span class="sub">pensar antes de gastar</span></h3>
    <div class="rfx-grid">${body}</div>
    <div class="budmeta" style="margin-top:10px">A IA reflete a partir dos seus próprios dados — curto, médio e longo prazo. Ajuste o valor da sua hora em Cadastros (⚙️).</div>`;
  c.querySelectorAll('.rfx-cta').forEach(b=>b.onclick=()=>{
    if(b.dataset.target==='base'){ view='base'; render(); }
    else toast('Veja o card indicado logo acima ↑');
  });
  return c;
}

/* ---------- GATING (Free x Pro) ----------
   Free = mês atual + o PRÓXIMO. Não é generosidade: a mágica do produto
   (parcela que se espalha, fatura por competência) só existe ENTRE meses.
   Travar tudo fazia a pessoa sair antes de sentir o valor — e "grátis
   limitado demais" é a reclamação nº1 contra o líder de mercado.
   O Pro vende o ano completo (Jan–Dez), IA, relatórios e cartões ilimitados. */
const isPro = () => S.plan==='pro';
const freeMonths = () => [S.current, Math.min(11, S.current+1)];
function monthLocked(m){ return !isPro() && !freeMonths().includes(m); }
function cardsLimited(){ return !isPro(); }                       // Free: até 2 cartões

/* ============================================================
   RENDER
   ============================================================ */
let activeMonth = S.current;
let view = 'month'; // month | year | base

function render(){
  renderStrip();
  document.getElementById('planChip').className = 'plan-chip '+(isPro()?'plan-pro':'plan-free');
  document.getElementById('planChip').textContent = isPro()?'Pro':'Free';
  document.getElementById('viewMonth').classList.toggle('hide', view!=='month');
  document.getElementById('viewYear').classList.toggle('hide', view!=='year');
  document.getElementById('viewBase').classList.toggle('hide', view!=='base');
  if(view==='month') renderMonth();
  if(view==='year')  renderYear();
  if(view==='base')  renderBase();
  save();
}

function renderStrip(){
  const el=document.getElementById('monthStrip'); el.innerHTML='';
  // botão dashboard
  const yb=document.createElement('button'); yb.className='mbtn'+(view==='year'?' active':''); yb.textContent='📊 Ano';
  yb.onclick=()=>{view='year';render()}; el.appendChild(yb);
  MONTHS.forEach((nm,m)=>{
    const b=document.createElement('button');
    const locked=monthLocked(m);
    b.className='mbtn'+(view==='month'&&m===activeMonth?' active':'')+(locked?' locked':'');
    b.innerHTML = MABBR[m] + (locked?'<span class="lk">🔒</span>':'');
    b.onclick=()=>{ if(locked){ paywall('Desbloqueie o ano inteiro'); return;} activeMonth=m; view='month'; render(); };
    el.appendChild(b);
  });
  /* mobile: traz o mês ativo para a vista — ninguém deve caçar o próprio mês */
  const at = el.querySelector('.mbtn.active');
  if(at && el.scrollWidth > el.clientWidth){
    el.scrollTo({ left: at.offsetLeft - el.clientWidth/2 + at.offsetWidth/2,
                  behavior: 'smooth' });
  }
}

  return `<div class="box"><div class="lab"><span class="dot" style="background:${color}"></span>${lab}</div>

  host.appendChild(chart);

  // parcelas do ano + top categorias
  const g=document.createElement('div'); g.className='grid g2'; g.style.marginTop='16px';
  g.appendChild(panoramaCard());
  // top categorias do ano
  const totals={}; S.categories.forEach(cat=>{let t=0;for(let m=0;m<12;m++)t+=categoryReal(cat,m);if(t>0)totals[cat]=t;});
  const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const tmax=Math.max(1,...sorted.map(x=>x[1]));
  const catcard=document.createElement('div'); catcard.className='card';
  catcard.innerHTML=`<h3>Para onde foi o dinheiro <span class="sub">top categorias do ano</span></h3>
    ${sorted.map(([cat,t])=>`<div style="padding:7px 0">
      <div style="display:flex;justify-content:space-between;font-size:13px"><span class="budcat">${esc(cat)}</span><span class="num budmeta">${BRL(t)}</span></div>
      <div class="bar"><i style="width:${t/tmax*100}%;background:var(--grad-brand)"></i></div></div>`).join('')||'<div class="empty">Sem gastos ainda.</div>'}`;
  g.appendChild(catcard);
  host.appendChild(g);

  if(!isPro()){
    const up=document.createElement('div'); up.className='card'; up.style.marginTop='16px'; up.style.textAlign='center';
    up.innerHTML=`<h3 style="justify-content:center">🔓 A visão anual completa é Pro</h3>
      <p class="budmeta">No Free você lança só o mês atual. Desbloqueie os 12 meses, cartões ilimitados e relatórios por <b>R$ 9,90/mês</b>.</p>
      <button class="btn" style="margin-top:10px" onclick="paywall()">Quero o ano inteiro</button>`;
    host.appendChild(up);
  }
}

/* ---------- VIEW BASE ---------- */
function renderBase(){
  const host=document.getElementById('viewBase'); host.innerHTML='';
  const wrap=document.createElement('div'); wrap.className='grid g2';
  // cartões
  const cc=document.createElement('div'); cc.className='card';
  cc.innerHTML=`<h3>💳 Cartões</h3>${S.cards.map(c=>`<div class="budline"><div class="budcat">${esc(c)}</div><div></div>
     <button class="rowdel" data-c="${esc(c)}">✕</button></div>`).join('')}
     <div class="addrow"><input class="f-desc" id="c-name" placeholder="Nome do cartão (ex.: Nubank)"><button class="btn btn-sm" id="c-add">Adicionar</button></div>
     ${cardsLimited()?`<div class="budmeta" style="margin-top:8px">Free: até 2 cartões. <a href="#" onclick="paywall();return false" style="color:var(--brand)">Vire Pro</a> para ilimitado.</div>`:''}`;
  cc.querySelectorAll('.rowdel').forEach(b=>b.onclick=()=>{S.cards=S.cards.filter(x=>x!==b.dataset.c);render()});
  cc.querySelector('#c-add').onclick=()=>{
    const n=cc.querySelector('#c-name').value.trim(); if(!n)return;
    if(cardsLimited()&&S.cards.length>=2)return paywall('Cartões ilimitados são Pro');
    if(!S.cards.includes(n))S.cards.push(n); toast('Cartão adicionado'); render();
  };
  wrap.appendChild(cc);
  // categorias + orçamento
  const bc=document.createElement('div'); bc.className='card';
  bc.innerHTML=`<h3>🏷️ Categorias & teto de gasto</h3>
    ${S.categories.map(cat=>`<div class="budline"><div class="budcat">${esc(cat)}</div>
      <input class="num" data-cat="${esc(cat)}" type="number" step="1" value="${S.budgets[cat]??''}" placeholder="teto"
        style="width:100px;padding:6px 9px;border:1px solid var(--line2);border-radius:8px">
      <button class="rowdel" data-cat="${esc(cat)}">✕</button></div>`).join('')}
    <div class="addrow"><input class="f-desc" id="cat-name" placeholder="Nova categoria"><button class="btn btn-sm" id="cat-add">Adicionar</button></div>`;
  bc.querySelectorAll('input[data-cat]').forEach(inp=>inp.onchange=()=>{S.budgets[inp.dataset.cat]=inp.value===''?0:+inp.value;render()});
  bc.querySelectorAll('.rowdel[data-cat]').forEach(b=>b.onclick=()=>{S.categories=S.categories.filter(x=>x!==b.dataset.cat);render()});
  bc.querySelector('#cat-add').onclick=()=>{const n=bc.querySelector('#cat-name').value.trim();if(n&&!S.categories.includes(n)){S.categories.push(n);S.budgets[n]=0;}render()};
  wrap.appendChild(bc);
  host.appendChild(wrap);

  // IA de Reflexão — valor da hora (custo de oportunidade)
  const ia=document.createElement('div'); ia.className='card reflex'; ia.style.marginTop='16px';
  ia.innerHTML=`<h3><span>✦ IA de Reflexão</span><span class="sub">custo de oportunidade</span></h3>
    <p class="budmeta">Quanto vale 1 hora do seu trabalho? A IA usa isso para traduzir gastos em horas. Em branco = estimado pela sua renda (${BRL(estHourly())}/h).</p>
    <div class="addrow">
      <input class="f-num num" id="ia-hw" type="number" step="0.01" placeholder="R$/hora" value="${S.hourlyWage??''}">
      <button class="btn btn-sm" id="ia-save">Salvar</button>
    </div>`;
  ia.querySelector('#ia-save').onclick=()=>{const v=ia.querySelector('#ia-hw').value; S.hourlyWage=v===''?null:+v; toast('Valor da hora atualizado'); render();};
  host.appendChild(ia);

  // dados
  const dc=document.createElement('div'); dc.className='card'; dc.style.marginTop='16px';
  dc.innerHTML=`<h3>💾 Seus dados</h3>
    <p class="budmeta">Tudo é salvo neste dispositivo. Exporte para backup ou leve para outro aparelho.</p>
    <div class="addrow">
      <button class="btn btn-ghost btn-sm" id="d-exp">⬇️ Exportar (.json)</button>
      <button class="btn btn-ghost btn-sm" id="d-imp">⬆️ Importar</button>
      <button class="btn btn-ghost btn-sm" id="d-demo">✨ Carregar exemplo (Julho)</button>
      <button class="btn btn-ghost btn-sm" id="d-reset" style="color:var(--neg);border-color:var(--neg-bg)">🗑️ Zerar tudo</button>
    </div><input type="file" id="d-file" accept="application/json" class="hide">`;
  dc.querySelector('#d-exp').onclick=exportData;
  dc.querySelector('#d-imp').onclick=()=>dc.querySelector('#d-file').click();
  dc.querySelector('#d-file').onchange=importData;
  dc.querySelector('#d-demo').onclick=loadDemo;
  dc.querySelector('#d-reset').onclick=()=>{if(confirm('Apagar todos os dados?')){S=structuredClone(DEFAULTS);S.current=new Date().getMonth();activeMonth=S.current;render();}};
  host.appendChild(dc);
}

/* ---------- OVERLAYS ---------- */
function paywall(reason){
  const r=document.getElementById('overlayRoot');
  r.innerHTML=`<div class="overlay" id="ov">
    <div class="sheet">
      <div class="brand-lockup" style="justify-content:center;margin-bottom:12px">
        <span class="brand-mark"><img src="brand/logo.svg" width="18" height="18"></span><span class="brand-word">VIZIO <b>Money</b></span></div>
      <h2>Desbloqueie tudo</h2>
      <p>${reason||'O ano inteiro, sem travas.'}</p>
      <div class="price">R$ 9,90<small>/mês</small></div>
      <div class="feat">
        <div><span class="ck">✔</span> Os 12 meses (Jan–Dez), não só o atual</div>
        <div><span class="ck">✔</span> Cartões e categorias ilimitados</div>
        <div><span class="ck">✔</span> Panorama de parcelamento & fatura por competência</div>
        <div><span class="ck">✔</span> Dashboard anual e relatórios</div>
        <div><span class="ck">✔</span> Seus dados protegidos (LGPD)</div>
      </div>
      <button class="btn" id="pw-go">Assinar o Pro</button>
      <button class="linklike" id="pw-close">Agora não</button>
      <div class="budmeta" style="margin-top:10px">Cobrança via Stripe/Pix entra na publicação. Aqui o botão simula a ativação.</div>
    </div></div>`;
  document.getElementById('pw-go').onclick=()=>{S.plan='pro';r.innerHTML='';celebrate('Bem-vindo ao Pro! 🎉');render();};
  document.getElementById('pw-close').onclick=()=>r.innerHTML='';
}

/* ---------- HELPERS ---------- */
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900);}
function celebrate(msg){toast(msg);}
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function fmtDate(d){if(!d)return'—';const p=String(d).split('-');return p.length===3?`${p[2]}/${p[1]}`:d;}
function today(m){const y=S.year;return `${y}-${String(m+1).padStart(2,'0')}-01`;}

function exportData(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`vizio-money-${S.year}.json`;a.click();toast('Backup exportado');}
function importData(e){const f=e.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{S=migrate(JSON.parse(rd.result));activeMonth=S.current=Math.min(11,S.current||0);toast('Dados importados');render();}catch(x){toast('Arquivo inválido')}};rd.readAsText(f);}

function loadDemo(){
  const m=6; // Julho
  const mm=month(m); mm.opening=1350;
  mm.incomes=[{date:'2026-07-01',desc:'Saldo em conta',value:1350},{date:'2026-07-01',desc:'Restituição IR',value:641.37},
    {date:'2026-07-02',desc:'Férias',value:4223.05},{date:'2026-07-06',desc:'Salário',value:5340.57}];
  mm.expenses=[{date:'2026-07-06',desc:'Energia',cat:'Contas de Casa',pay:'Pix',value:180},
    {date:'2026-07-06',desc:'Internet',cat:'Contas de Casa',pay:'Pix',value:90},
    {date:'2026-07-06',desc:'Parcela MRV',cat:'Apartamento',pay:'Pix',value:1155.65},
    {date:'2026-07-06',desc:'Netflix',cat:'Assinaturas',pay:'C6',value:59.90},
    {date:'2026-07-11',desc:'Mercado',cat:'Alimentação',pay:'C6',value:104.05},
    {date:'2026-07-09',desc:'iFood',cat:'Lazer',pay:'C6',value:35},
    {date:'2026-07-04',desc:'Mat. Construção',cat:'Moradia',pay:'C6',value:115}];
  mm.investments=[{date:'2026-07-02',place:'Caixinha Nu',value:200}];
  S.purchases=[
    {id:uid(),desc:'Celular pai',cat:'Presentes',card:'MP',value:89.87,parcelas:24,start:6},
    {id:uid(),desc:'Televisão',cat:'Outros',card:'MP',value:229.80,parcelas:10,start:6},
    {id:uid(),desc:'Perfume Versace',cat:'Beleza',card:'C6',value:112.37,parcelas:8,start:6},
    {id:uid(),desc:'Conj. Academia',cat:'Roupas',card:'MP',value:179.29,parcelas:2,start:6}];
  activeMonth=6; view='month'; toast('Exemplo de Julho carregado ✨'); render();
}

/* topbar buttons */
document.getElementById('btnBase').onclick=()=>{view=view==='base'?'month':'base';render();};
document.getElementById('btnMenu').onclick=()=>{ if(isPro()){if(confirm('Voltar para o plano Free? (teste)')){S.plan='free';render();}} else paywall('Assine o VIZIO Money Pro'); };

/* PWA */
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}

render();
</script>
