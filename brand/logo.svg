<svg xmlns="http://www.w3.org/2000/svg" viewBox="-46 -36 727 654" width="64" height="58" fill="none" role="img" aria-label="VIZIO Money">
  <title>VIZIO Money — VIZIO FINANCE</title>
  <!-- ============================================================
       Símbolo M · VIZIO Money (VIZIO FINANCE)
       Geometria SIMÉTRICA (vértice no centro), hastes verticais e
       ápices em ponta viva (miter). Metal marmorizado: gradiente
       azul VIZIO (#1C64F0) -> ouro (#C9A968), veios procedurais,
       brilho especular e fio de luz nas arestas.
       ============================================================ -->
  <defs>
    <!-- metal escovado: azul (marca) sobe e vira ouro (valor) -->
    <linearGradient id="vmMetal" x1="42" y1="582" x2="592" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#0F3A9E"/>
      <stop offset=".13" stop-color="#1C64F0"/>
      <stop offset=".26" stop-color="#4E93FF"/>
      <stop offset=".35" stop-color="#9CC6FF"/>
      <stop offset=".44" stop-color="#2E72F2"/>
      <stop offset=".56" stop-color="#7E86B8"/>
      <stop offset=".64" stop-color="#B99C63"/>
      <stop offset=".72" stop-color="#F0E0B0"/>
      <stop offset=".80" stop-color="#C9A968"/>
      <stop offset=".90" stop-color="#E8D29A"/>
      <stop offset="1"   stop-color="#8A6E3A"/>
    </linearGradient>
    <!-- veios de mármore (procedural: escala sem pixelar) -->
    <filter id="vmMarble" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.006 0.045" numOctaves="4" seed="11" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="g"/>
      <feComponentTransfer in="g" result="v"><feFuncA type="table" tableValues="0 .55"/></feComponentTransfer>
      <feComposite in="v" in2="SourceGraphic" operator="in" result="vin"/>
      <feBlend in="SourceGraphic" in2="vin" mode="overlay"/>
    </filter>
    <!-- brilho especular cruzando o metal -->
    <linearGradient id="vmSpec" x1="0" y1="1" x2="1" y2="0">
      <stop offset=".30" stop-color="#fff" stop-opacity="0"/>
      <stop offset=".47" stop-color="#fff" stop-opacity=".55"/>
      <stop offset=".54" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g filter="url(#vmMarble)">
    <path d="M42 582 V44 L317 372 L592 44 V582" stroke="url(#vmMetal)" stroke-width="85"
          stroke-linejoin="miter" stroke-linecap="butt" stroke-miterlimit="12"/>
  </g>
  <path d="M42 582 V44 L317 372 L592 44 V582" stroke="url(#vmSpec)" stroke-width="85"
        stroke-linejoin="miter" stroke-linecap="butt" stroke-miterlimit="12"/>
  <path d="M42 582 V44 L317 372 L592 44 V582" stroke="#FFF6DC" stroke-opacity=".5" stroke-width="4"
        stroke-linejoin="miter" stroke-linecap="butt" stroke-miterlimit="12"/>
</svg>
